<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Eglence Oyunlari</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;overscroll-behavior:none}
body{
  font-family:'Nunito',sans-serif;
  background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
  color:#fff;user-select:none;-webkit-user-select:none;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}

/* SCREEN SYSTEM */
.screen{display:none !important;flex-direction:column;height:100%}
.screen.active{display:flex !important}

/* MENU */
#menu{align-items:center;justify-content:center;padding:16px;gap:10px}
#menu h1{font-size:min(2em,7vw);text-shadow:3px 3px 0 rgba(0,0,0,.2)}
#menu .sub{font-size:min(1em,4vw);opacity:.8;margin-bottom:6px}
.gg{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  max-width:400px;width:100%;overflow-y:auto;max-height:calc(100vh - 100px);
  padding:4px;
}
.gc{
  background:rgba(255,255,255,.18);backdrop-filter:blur(6px);
  border:2px solid rgba(255,255,255,.3);border-radius:18px;
  padding:14px 8px;text-align:center;cursor:pointer;
  transition:transform .12s;
}
.gc:active{transform:scale(.95)}
.gc .gi{font-size:min(2.4em,10vw)}
.gc .gl{font-size:min(.85em,3.5vw);margin-top:4px;font-weight:700}

/* TOP BAR */
.tb{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:rgba(0,0,0,.18);min-height:50px;flex-shrink:0}
.tb .bb{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:1.3em;width:42px;height:42px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.tb .tt{font-size:min(1.1em,4.5vw);font-weight:900}
.tb .ts{font-size:min(1em,4vw)}
.ga{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;position:relative;overflow:hidden}

/* FEEDBACK */
.fb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:min(2em,8vw);font-weight:900;padding:14px 28px;border-radius:18px;z-index:100;pointer-events:none;animation:fpop .6s forwards;text-shadow:2px 2px 0 rgba(0,0,0,.15)}
.fb.ok{background:rgba(0,184,148,.9)}.fb.no{background:rgba(214,48,49,.85)}
@keyframes fpop{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.15);opacity:1}70%{transform:translate(-50%,-50%) scale(1)}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
.cf{position:fixed;width:10px;height:10px;z-index:200;pointer-events:none;animation:cfall 1s forwards}
@keyframes cfall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* LEVEL COMPLETE */
.lc{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;animation:fi .3s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.lc h2{font-size:min(2em,8vw)}
.lc .sb{font-size:min(2.5em,10vw);margin:8px 0}
.lc button{font-family:'Nunito',sans-serif;font-size:1.1em;font-weight:900;padding:12px 30px;border-radius:14px;border:none;background:#fff;color:#764ba2;cursor:pointer;margin:6px}

/* ===== 1. BOYAMA ===== */
#boyama-game{background:linear-gradient(180deg,#dfe6e9,#b2bec3)}
#boyama-game .ga{padding:0;justify-content:flex-start}
.draw-canvas{width:100%;flex:1;background:#fff;cursor:crosshair;touch-action:none}
.color-bar{display:flex;gap:6px;padding:8px 10px;flex-wrap:wrap;justify-content:center;background:rgba(0,0,0,.1)}
.cbtn{width:40px;height:40px;border-radius:50%;border:3px solid rgba(255,255,255,.6);cursor:pointer;transition:transform .1s}
.cbtn:active,.cbtn.sel{transform:scale(1.2);border-color:#fff;box-shadow:0 0 10px rgba(0,0,0,.3)}
.tool-btn{width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,.5);background:rgba(255,255,255,.25);color:#333;font-size:1.2em;cursor:pointer;display:flex;align-items:center;justify-content:center}
.tool-btn:active,.tool-btn.sel{background:rgba(255,255,255,.6)}

/* ===== 2. HAFIZA ===== */
#hafiza-game{background:linear-gradient(180deg,#a29bfe,#6c5ce7)}
.card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:360px;width:100%}
.mcard{aspect-ratio:1;border-radius:14px;cursor:pointer;perspective:600px;font-size:min(2em,8vw)}
.mcard-inner{position:relative;width:100%;height:100%;transition:transform .4s;transform-style:preserve-3d}
.mcard.flipped .mcard-inner{transform:rotateY(180deg)}
.mcard-front,.mcard-back{position:absolute;width:100%;height:100%;border-radius:14px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden}
.mcard-front{background:linear-gradient(135deg,#fd79a8,#e84393);font-size:1.2em}
.mcard-back{background:rgba(255,255,255,.25);transform:rotateY(180deg)}
.mcard.matched .mcard-back{background:rgba(0,184,148,.4)}
.mem-info{font-size:1.1em;margin-bottom:10px}

/* ===== 3. MUZIK ===== */
#muzik-game{background:linear-gradient(180deg,#fd79a8,#e84393)}
.piano{display:flex;gap:4px;width:100%;max-width:400px;justify-content:center;margin:10px 0}
.pkey{flex:1;min-height:120px;border-radius:0 0 12px 12px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-size:min(.8em,3vw);font-weight:900;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:12px;transition:filter .1s,transform .1s}
.pkey:active,.pkey.lit{filter:brightness(1.3);transform:scaleY(.97)}
.simon-display{font-size:1.2em;font-weight:700;min-height:2em;text-align:center;margin:8px 0}
.mode-btns{display:flex;gap:8px;margin-bottom:10px}
.mode-btns button{font-family:'Nunito',sans-serif;font-size:.9em;font-weight:700;padding:8px 16px;border-radius:10px;border:2px solid rgba(255,255,255,.5);background:rgba(255,255,255,.2);color:#fff;cursor:pointer}
.mode-btns button.sel{background:rgba(255,255,255,.4)}

/* ===== 4. YILAN ===== */
#yilan-game{background:linear-gradient(180deg,#00b894,#00cec9)}
#yilan-game .ga{padding:6px;gap:6px}
.snake-canvas{background:#2d3436;border-radius:12px;max-width:min(85vw,320px);max-height:min(45vh,320px);aspect-ratio:1;width:100%}
.dpad{position:relative;width:190px;height:190px;margin:4px auto}
.dpad button{position:absolute;width:58px;height:58px;border-radius:16px;border:none;background:rgba(255,255,255,.35);color:#fff;font-size:1.6em;cursor:pointer;font-family:'Nunito',sans-serif}
.dpad button:active{background:rgba(255,255,255,.6);transform:scale(.93)}
.dpad .du{top:0;left:50%;transform:translateX(-50%)}
.dpad .dd{bottom:0;left:50%;transform:translateX(-50%)}
.dpad .dl{top:50%;left:0;transform:translateY(-50%)}
.dpad .dr{top:50%;right:0;transform:translateY(-50%)}
.snake-info{font-size:1.1em;font-weight:700}

/* ===== 5. MARIO ===== */
#runner-game{background:linear-gradient(180deg,#74b9ff,#0984e3)}
#runner-game .ga{padding:6px;gap:6px}
.run-canvas{border-radius:12px;width:100%;max-width:500px;height:280px}
.run-info{font-size:1.2em;font-weight:700}
.run-hint{font-size:min(1em,4vw);opacity:.8}
.mario-controls{display:flex;gap:16px;align-items:center;justify-content:space-between;width:100%;max-width:400px;padding:0 10px}
.mario-lr{display:flex;gap:6px}
.mario-lr button,.mario-jump{width:60px;height:60px;border-radius:16px;border:none;background:rgba(255,255,255,.35);color:#fff;font-size:1.6em;cursor:pointer;font-family:'Nunito',sans-serif}
.mario-lr button:active,.mario-jump:active{background:rgba(255,255,255,.6);transform:scale(.93)}
.mario-jump{width:80px;height:80px;border-radius:50%;font-size:1.2em;background:rgba(255,80,80,.5)}

/* ===== 6. BALON PATLATMA ===== */
#balon-game{background:linear-gradient(180deg,#55efc4,#00b894)}
.balon-area{position:relative;width:100%;flex:1;overflow:hidden}
.balon{position:absolute;cursor:pointer;transition:transform .08s}
.balon:active{transform:scale(.85)}
.balon svg{width:60px;height:76px}
.balon.pop{animation:bpop .3s forwards}
@keyframes bpop{0%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}100%{transform:scale(0);opacity:0}}
.balon-hud{display:flex;justify-content:space-between;width:100%;padding:0 10px;font-size:1.2em;font-weight:700}
.timer-bar{width:100%;height:8px;background:rgba(255,255,255,.3);border-radius:4px;margin:6px 0}
.timer-fill{height:100%;background:#fff;border-radius:4px;transition:width .3s}

/* ===== 7. RENK ESLESTIRME ===== */
#renk-game{background:linear-gradient(180deg,#fdcb6e,#e17055)}
.renk-target{font-size:min(1.5em,6vw);font-weight:900;text-align:center;margin:10px 0;min-height:2em}
.renk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:320px;width:100%}
.renk-item{aspect-ratio:1;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:min(3.5em,14vw);cursor:pointer;border:3px solid rgba(255,255,255,.3);transition:transform .1s}
.renk-item:active{transform:scale(.9)}
.renk-item.ok{border-color:#00b894;background:rgba(0,184,148,.3) !important}
.renk-item.no{animation:shake .4s;border-color:#d63031}
.renk-score{font-size:1.1em;margin-bottom:8px}

/* ===== 8. HAYVAN SESLERI ===== */
#hayvan-game{background:linear-gradient(180deg,#fab1a0,#e17055)}
.hayvan-prompt{font-size:min(1.4em,5.5vw);font-weight:700;text-align:center;margin:10px 0}
.play-sound-btn{font-size:2.5em;width:80px;height:80px;border-radius:50%;border:4px solid rgba(255,255,255,.5);background:rgba(255,255,255,.2);cursor:pointer;display:flex;align-items:center;justify-content:center;margin:10px 0;transition:transform .1s}
.play-sound-btn:active{transform:scale(.9)}
.hayvan-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:300px;width:100%}
.hayvan-card{padding:16px;border-radius:16px;background:rgba(255,255,255,.2);border:3px solid rgba(255,255,255,.3);text-align:center;cursor:pointer;transition:transform .1s}
.hayvan-card:active{transform:scale(.93)}
.hayvan-card .he{font-size:min(2.5em,10vw)}
.hayvan-card .hn{font-size:min(.9em,3.5vw);margin-top:4px;font-weight:700}
.hayvan-card.ok{background:rgba(0,184,148,.4);border-color:#00b894}
.hayvan-card.no{animation:shake .4s;border-color:#d63031}
</style>
</head>
<body>

<!-- MENU -->
<div id="menu" class="screen active">
  <h1>Eglence Oyunlari</h1>
  <div class="sub">Bir oyun sec!</div>
  <div class="gg">
    <div class="gc" data-game="boyama"><div class="gi">🎨</div><div class="gl">Boyama</div></div>
    <div class="gc" data-game="hafiza"><div class="gi">🧩</div><div class="gl">Hafiza Kartlari</div></div>
    <div class="gc" data-game="muzik"><div class="gi">🎵</div><div class="gl">Piyano</div></div>
    <div class="gc" data-game="yilan"><div class="gi">🐍</div><div class="gl">Yilan</div></div>
    <div class="gc" data-game="runner"><div class="gi">🍄</div><div class="gl">Super Mario</div></div>
    <div class="gc" data-game="balon"><div class="gi">🫧</div><div class="gl">Balon Patlatma</div></div>
    <div class="gc" data-game="renk"><div class="gi">🎯</div><div class="gl">Renk Eslestirme</div></div>
    <div class="gc" data-game="hayvan"><div class="gi">🐾</div><div class="gl">Hayvan Sesleri</div></div>
  </div>
</div>

<!-- 1. BOYAMA -->
<div id="boyama-game" class="screen">
  <div class="tb"><button class="bb">&#9664;</button><span class="tt">🎨 Boyama</span><span></span></div>
  <div class="ga">
    <canvas class="draw-canvas" id="draw-canvas"></canvas>
    <div class="color-bar" id="color-bar"></div>
  </div>
</div>

<!-- 2. HAFIZA -->
<div id="hafiza-game" class="screen">
  <div class="tb"><button class="bb">&#9664;</button><span class="tt">🧩 Hafiza</span><span class="ts" id="mem-score"></span></div>
  <div class="ga">
    <div class="mem-info" id="mem-info"></div>
    <div class="card-grid" id="card-grid"></div>
  </div>
</div>

<!-- 3. MUZIK -->
<div id="muzik-game" class="screen">
  <div class="tb"><button class="bb">&#9664;</button><span class="tt">🎵 Piyano</span><span class="ts" id="muzik-score"></span></div>
  <div class="ga">
    <div class="mode-btns" id="mode-btns">
      <button class="sel" data-mode="free">Serbest</button>
      <button data-mode="simon">Simon</button>
    </div>
    <div class="simon-display" id="simon-display"></div>
    <div class="piano" id="piano"></div>
  </div>
</div>

<!-- 4. YILAN -->
<div id="yilan-game" class="screen">
  <div class="tb"><button class="bb">&#9664;</button><span class="tt">🐍 Yilan</span><span class="ts" id="yilan-score">Skor: 0</span></div>
  <div class="ga">
    <canvas class="snake-canvas" id="snake-canvas"></canvas>
    <div class="snake-info" id="snake-info"></div>
    <div class="dpad">
      <button class="du" data-dir="up">&#9650;</button>
      <button class="dl" data-dir="left">&#9664;</button>
      <button class="dr" data-dir="right">&#9654;</button>
      <button class="dd" data-dir="down">&#9660;</button>
    </div>
  </div>
</div>

<!-- 5. MARIO -->
<div id="runner-game" class="screen">
  <div class="tb"><button class="bb">&#9664;</button><span class="tt">🍄 Super Mario</span><span class="ts" id="runner-score">Skor: 0</span></div>
  <div class="ga" id="runner-tap">
    <canvas class="run-canvas" id="run-canvas"></canvas>
    <div class="run-info" id="run-info"></div>
    <div class="mario-controls">
      <div class="mario-lr">
        <button id="mario-left">&#9664;</button>
        <button id="mario-right">&#9654;</button>
      </div>
      <button class="mario-jump" id="mario-jump-btn">ZIPLA</button>
    </div>
  </div>
</div>

<!-- 6. BALON -->
<div id="balon-game" class="screen">
  <div class="tb"><button class="bb">&#9664;</button><span class="tt">🫧 Balonlar</span><span class="ts" id="balon-score">0</span></div>
  <div class="ga">
    <div class="balon-hud">
      <span id="balon-timer-text">30s</span>
      <span id="balon-pts">0 puan</span>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
    <div class="balon-area" id="balon-area"></div>
  </div>
</div>

<!-- 7. RENK -->
<div id="renk-game" class="screen">
  <div class="tb"><button class="bb">&#9664;</button><span class="tt">🎯 Renkler</span><span class="ts" id="renk-score-display">0</span></div>
  <div class="ga">
    <div class="renk-target" id="renk-target"></div>
    <div class="renk-grid" id="renk-grid"></div>
  </div>
</div>

<!-- 8. HAYVAN -->
<div id="hayvan-game" class="screen">
  <div class="tb"><button class="bb">&#9664;</button><span class="tt">🐾 Hayvanlar</span><span class="ts" id="hayvan-score-display">0</span></div>
  <div class="ga">
    <div class="hayvan-prompt" id="hayvan-prompt">Bu hangi hayvan?</div>
    <button class="play-sound-btn" id="play-sound-btn">🔊</button>
    <div class="hayvan-grid" id="hayvan-grid"></div>
  </div>
</div>

<script>
// ===== AUDIO =====
const AC=window.AudioContext||window.webkitAudioContext;let ac;
function ea(){if(!ac)ac=new AC()}
function tone(f,d,t='sine',v=.18){ea();const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}
function sndOk(){tone(523,.1);setTimeout(()=>tone(659,.1),80);setTimeout(()=>tone(784,.18),160)}
function sndNo(){tone(200,.22,'sawtooth')}
function sndPop(){tone(900,.07)}

// ===== HELPERS =====
function R(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function sh(a){for(let i=a.length-1;i>0;i--){const j=R(0,i);[a[i],a[j]]=[a[j],a[i]]}return a}
function showFB(ok){const e=document.createElement('div');e.className='fb '+(ok?'ok':'no');e.textContent=ok?'Aferin! 🎉':'Tekrar dene! 💪';document.body.appendChild(e);setTimeout(()=>e.remove(),700)}
function confetti(){const c=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6b9d','#c084fc'];for(let i=0;i<25;i++){const e=document.createElement('div');e.className='cf';e.style.left=R(5,95)+'%';e.style.top=R(-5,5)+'%';e.style.background=c[R(0,5)];e.style.borderRadius=Math.random()>.5?'50%':'2px';e.style.width=R(6,11)+'px';e.style.height=R(6,11)+'px';e.style.animationDuration=(.7+Math.random()*.6)+'s';e.style.animationDelay=(Math.random()*.2)+'s';document.body.appendChild(e);setTimeout(()=>e.remove(),1500)}}

// ===== NAV =====
let curGame=null;
function showScr(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function goMenu(){if(curGame==='yilan')stopSnake();if(curGame==='runner')stopRunner();if(curGame==='balon')stopBalon();document.querySelectorAll('.lc').forEach(e=>e.remove());curGame=null;showScr('menu')}
function startGame(g){curGame=g;showScr(g+'-game');switch(g){case'boyama':initBoyama();break;case'hafiza':initHafiza();break;case'muzik':initMuzik();break;case'yilan':initYilan();break;case'runner':initRunner();break;case'balon':initBalon();break;case'renk':initRenk();break;case'hayvan':initHayvan();break}}
document.querySelectorAll('.gc').forEach(c=>{c.addEventListener('click',()=>startGame(c.dataset.game))});
document.querySelectorAll('.bb').forEach(b=>{b.addEventListener('click',goMenu)});

// ===== 1. BOYAMA =====
let drawCtx,drawing=false,drawColor='#e74c3c',drawSize=5,erasing=false;
const drawColors=['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#e84393','#2d3436','#fff'];
function initBoyama(){
  const cv=document.getElementById('draw-canvas');
  const rect=cv.parentElement.getBoundingClientRect();
  cv.width=rect.width;cv.height=rect.height-60;
  drawCtx=cv.getContext('2d');drawCtx.fillStyle='#fff';drawCtx.fillRect(0,0,cv.width,cv.height);
  drawCtx.lineCap='round';drawCtx.lineJoin='round';
  // color bar
  const bar=document.getElementById('color-bar');bar.innerHTML='';
  drawColors.forEach(c=>{const b=document.createElement('div');b.className='cbtn'+(c===drawColor?' sel':'');b.style.background=c;if(c==='#fff')b.style.border='3px solid #bbb';b.addEventListener('click',()=>{erasing=false;drawColor=c;bar.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');bar.querySelectorAll('.tool-btn').forEach(x=>x.classList.remove('sel'))});bar.appendChild(b)});
  // eraser
  const er=document.createElement('div');er.className='tool-btn';er.textContent='🧹';er.addEventListener('click',()=>{erasing=true;bar.querySelectorAll('.cbtn,.tool-btn').forEach(x=>x.classList.remove('sel'));er.classList.add('sel')});bar.appendChild(er);
  // clear
  const cl=document.createElement('div');cl.className='tool-btn';cl.textContent='🗑️';cl.addEventListener('click',()=>{drawCtx.fillStyle='#fff';drawCtx.fillRect(0,0,cv.width,cv.height)});bar.appendChild(cl);
  // size toggle
  const sz=document.createElement('div');sz.className='tool-btn';sz.textContent=drawSize===5?'●':'⬤';sz.addEventListener('click',()=>{drawSize=drawSize===5?14:5;sz.textContent=drawSize===5?'●':'⬤'});bar.appendChild(sz);
  // events
  function pos(e){const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
  function dn(e){e.preventDefault();drawing=true;const p=pos(e);drawCtx.beginPath();drawCtx.moveTo(p.x,p.y)}
  function mv(e){if(!drawing)return;e.preventDefault();const p=pos(e);drawCtx.lineWidth=erasing?20:drawSize;drawCtx.strokeStyle=erasing?'#fff':drawColor;drawCtx.lineTo(p.x,p.y);drawCtx.stroke();drawCtx.beginPath();drawCtx.moveTo(p.x,p.y)}
  function up(){drawing=false;drawCtx.beginPath()}
  cv.onmousedown=dn;cv.onmousemove=mv;cv.onmouseup=up;cv.onmouseleave=up;
  cv.ontouchstart=dn;cv.ontouchmove=mv;cv.ontouchend=up;cv.ontouchcancel=up;
}

// ===== 2. HAFIZA =====
let memCards,memFlipped=[],memMatched=0,memMoves=0,memLocked=false;
const memEmojis=['🐱','🐶','🐰','🐟','🐦','🦋'];
function initHafiza(){
  memFlipped=[];memMatched=0;memMoves=0;memLocked=false;
  document.getElementById('mem-score').textContent='';
  document.getElementById('mem-info').textContent='Esleri bul! Hamle: 0';
  const pairs=[...memEmojis,...memEmojis];sh(pairs);
  const grid=document.getElementById('card-grid');grid.innerHTML='';
  memCards=pairs.map((emoji,i)=>{
    const card=document.createElement('div');card.className='mcard';card.dataset.idx=i;card.dataset.emoji=emoji;
    card.innerHTML=`<div class="mcard-inner"><div class="mcard-front">❓</div><div class="mcard-back">${emoji}</div></div>`;
    card.addEventListener('click',()=>flipCard(card));
    grid.appendChild(card);return card;
  });
}
function flipCard(card){
  if(memLocked||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  card.classList.add('flipped');sndPop();memFlipped.push(card);
  if(memFlipped.length===2){memLocked=true;memMoves++;document.getElementById('mem-info').textContent='Esleri bul! Hamle: '+memMoves;
    const[a,b]=memFlipped;
    if(a.dataset.emoji===b.dataset.emoji){a.classList.add('matched');b.classList.add('matched');memMatched+=2;memFlipped=[];memLocked=false;sndOk();
      if(memMatched===12){setTimeout(()=>{confetti();showFB(true);document.getElementById('mem-info').textContent=memMoves+' hamlede bitirdin! 🏆'},300)}
    }else{setTimeout(()=>{a.classList.remove('flipped');b.classList.remove('flipped');memFlipped=[];memLocked=false;sndNo()},700)}
  }
}

// ===== 3. MUZIK =====
const notes=[{n:'Do',f:261.6,c:'#e74c3c'},{n:'Re',f:293.7,c:'#e67e22'},{n:'Mi',f:329.6,c:'#f1c40f'},{n:'Fa',f:349.2,c:'#2ecc71'},{n:'Sol',f:392,c:'#3498db'},{n:'La',f:440,c:'#9b59b6'},{n:'Si',f:493.9,c:'#e84393'},{n:'Do2',f:523.3,c:'#d63031'}];
let muzMode='free',simonSeq=[],simonIdx=0,simonLocked=false,simonScore=0;
function initMuzik(){
  muzMode='free';simonSeq=[];simonScore=0;simonLocked=false;
  document.getElementById('muzik-score').textContent='';
  document.getElementById('simon-display').textContent='';
  const piano=document.getElementById('piano');piano.innerHTML='';
  notes.forEach((note,i)=>{
    const k=document.createElement('button');k.className='pkey';k.style.background=note.c;k.dataset.idx=i;
    k.innerHTML=`<span>${note.n}</span>`;
    k.addEventListener('pointerdown',(e)=>{e.preventDefault();pressKey(i)});
    piano.appendChild(k);
  });
  document.querySelectorAll('#mode-btns button').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('#mode-btns button').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');
      muzMode=b.dataset.mode;document.getElementById('simon-display').textContent='';
      if(muzMode==='simon'){simonScore=0;document.getElementById('muzik-score').textContent='Skor: 0';newSimon()}
      else{document.getElementById('muzik-score').textContent=''}
    });
  });
}
function pressKey(i){
  ea();tone(notes[i].f,.35);
  const keys=document.querySelectorAll('.pkey');keys[i].classList.add('lit');setTimeout(()=>keys[i].classList.remove('lit'),200);
  if(muzMode==='simon'&&!simonLocked){
    if(i===simonSeq[simonIdx]){simonIdx++;
      if(simonIdx===simonSeq.length){simonLocked=true;simonScore++;document.getElementById('muzik-score').textContent='Skor: '+simonScore;
        document.getElementById('simon-display').textContent='Dogru! 🎉';sndOk();confetti();setTimeout(newSimon,1000)}
    }else{sndNo();showFB(false);document.getElementById('simon-display').textContent='Yanlis! Tekrar dinle...';simonLocked=true;setTimeout(()=>playSimonSeq(),800)}
  }
}
function newSimon(){simonSeq.push(R(0,7));simonIdx=0;simonLocked=true;document.getElementById('simon-display').textContent='Dinle...';setTimeout(()=>playSimonSeq(),500)}
function playSimonSeq(){simonLocked=true;let i=0;const iv=setInterval(()=>{if(i>=simonSeq.length){clearInterval(iv);simonLocked=false;simonIdx=0;document.getElementById('simon-display').textContent='Senin siran!';return}
  const keys=document.querySelectorAll('.pkey');const idx=simonSeq[i];tone(notes[idx].f,.3);keys[idx].classList.add('lit');setTimeout(()=>keys[idx].classList.remove('lit'),300);i++},500)}

// ===== 4. YILAN =====
let snakeCanvas,snakeCtx,snakeDir,snake,snakeFood,snakeScore2,snakeAlive,snakeTimer;
const SG=12;
function initYilan(){
  snakeCanvas=document.getElementById('snake-canvas');
  const s=Math.min(snakeCanvas.parentElement.clientWidth*.85,320);
  snakeCanvas.width=s;snakeCanvas.height=s;
  snakeCtx=snakeCanvas.getContext('2d');
  snakeDir='right';snake=[{x:3,y:5},{x:2,y:5},{x:1,y:5}];snakeScore2=0;snakeAlive=true;
  document.getElementById('yilan-score').textContent='Skor: 0';
  document.getElementById('snake-info').textContent='';
  placeFood();drawSnake();
  if(snakeTimer)clearInterval(snakeTimer);
  snakeTimer=setInterval(stepSnake,280);
  // D-pad buttons with touch support
  document.querySelectorAll('.dpad button').forEach(b=>{
    function setDir(){
      const d=b.dataset.dir;
      if(d==='up'&&snakeDir!=='down')snakeDir='up';
      if(d==='down'&&snakeDir!=='up')snakeDir='down';
      if(d==='left'&&snakeDir!=='right')snakeDir='left';
      if(d==='right'&&snakeDir!=='left')snakeDir='right';
    }
    b.onclick=setDir;
    b.ontouchstart=function(e){e.preventDefault();setDir()};
  });
  // Swipe support on canvas
  let tx=0,ty=0;
  snakeCanvas.ontouchstart=function(e){const t=e.touches[0];tx=t.clientX;ty=t.clientY};
  snakeCanvas.ontouchend=function(e){
    const t=e.changedTouches[0];const dx=t.clientX-tx,dy=t.clientY-ty;
    if(Math.abs(dx)<15&&Math.abs(dy)<15)return;
    if(Math.abs(dx)>Math.abs(dy)){if(dx>0&&snakeDir!=='left')snakeDir='right';else if(dx<0&&snakeDir!=='right')snakeDir='left'}
    else{if(dy>0&&snakeDir!=='up')snakeDir='down';else if(dy<0&&snakeDir!=='down')snakeDir='up'}
  };
  // Keyboard support
  document.onkeydown=function(e){
    if(curGame!=='yilan')return;
    if(e.key==='ArrowUp'&&snakeDir!=='down')snakeDir='up';
    if(e.key==='ArrowDown'&&snakeDir!=='up')snakeDir='down';
    if(e.key==='ArrowLeft'&&snakeDir!=='right')snakeDir='left';
    if(e.key==='ArrowRight'&&snakeDir!=='left')snakeDir='right';
  };
}
function stopSnake(){if(snakeTimer){clearInterval(snakeTimer);snakeTimer=null}}
function placeFood(){snakeFood={x:R(0,SG-1),y:R(0,SG-1)};while(snake.some(s=>s.x===snakeFood.x&&s.y===snakeFood.y))snakeFood={x:R(0,SG-1),y:R(0,SG-1)}}
function stepSnake(){
  if(!snakeAlive)return;
  const h={...snake[0]};
  if(snakeDir==='up')h.y--;if(snakeDir==='down')h.y++;if(snakeDir==='left')h.x--;if(snakeDir==='right')h.x++;
  if(h.x<0||h.x>=SG||h.y<0||h.y>=SG||snake.some(s=>s.x===h.x&&s.y===h.y)){
    snakeAlive=false;stopSnake();sndNo();
    document.getElementById('snake-info').textContent='Oyun bitti! Skor: '+snakeScore2;
    const ov=document.createElement('div');ov.className='lc';ov.innerHTML=`<h2>Oyun Bitti!</h2><div class="sb">${snakeScore2} puan</div><button id="snake-retry">Tekrar</button><button id="snake-menu">Menu</button>`;
    document.body.appendChild(ov);
    ov.querySelector('#snake-retry').onclick=()=>{ov.remove();initYilan()};
    ov.querySelector('#snake-menu').onclick=()=>{ov.remove();goMenu()};
    return;
  }
  snake.unshift(h);
  if(h.x===snakeFood.x&&h.y===snakeFood.y){snakeScore2++;document.getElementById('yilan-score').textContent='Skor: '+snakeScore2;sndOk();placeFood()}
  else snake.pop();
  drawSnake();
}
function drawSnake(){
  const c=snakeCtx,w=snakeCanvas.width,cs=w/SG;
  c.fillStyle='#2d3436';c.fillRect(0,0,w,w);
  c.strokeStyle='#3d4446';c.lineWidth=.5;for(let i=0;i<=SG;i++){c.beginPath();c.moveTo(i*cs,0);c.lineTo(i*cs,w);c.stroke();c.beginPath();c.moveTo(0,i*cs);c.lineTo(w,i*cs);c.stroke()}
  c.font=(cs*.7)+'px serif';c.textAlign='center';c.textBaseline='middle';
  c.fillText('🍎',snakeFood.x*cs+cs/2,snakeFood.y*cs+cs/2);
  snake.forEach((s,i)=>{c.fillStyle=i===0?'#00b894':'#55efc4';c.beginPath();c.roundRect(s.x*cs+1,s.y*cs+1,cs-2,cs-2,4);c.fill()});
}

// ===== 5. MARIO =====
let runCanvas,runCtx,runAF,runAlive,runScore3,mario,marioCoins,marioEnemies,marioPlatforms,runFrame,cameraX,marioKeys;
const MARIO_G=0.5,MARIO_JUMP=-10,MARIO_SPD=3;
const heroImg=new Image();heroImg.src='hero.png';let heroLoaded=false;heroImg.onload=()=>{heroLoaded=true};
function initRunner(){
  runCanvas=document.getElementById('run-canvas');
  runCanvas.width=Math.min(runCanvas.parentElement.clientWidth,500);runCanvas.height=280;
  runCtx=runCanvas.getContext('2d');
  mario={x:60,y:0,vy:0,vx:0,onGround:true,facing:1};
  marioCoins=[];marioEnemies=[];marioPlatforms=[];runScore3=0;runFrame=0;cameraX=0;runAlive=true;
  marioKeys={left:false,right:false};
  document.getElementById('runner-score').textContent='Skor: 0';
  document.getElementById('run-info').textContent='';
  // Generate level
  const GY=230;
  // Ground platforms
  for(let i=0;i<50;i++){
    if(i<3||Math.random()>.2) marioPlatforms.push({x:i*100,y:GY,w:100,h:50,type:'ground'});
  }
  // Floating platforms
  for(let i=3;i<50;i++){
    if(Math.random()>.6) marioPlatforms.push({x:i*100+R(0,40),y:GY-R(60,120),w:R(60,100),h:16,type:'brick'});
  }
  // Coins
  for(let i=2;i<50;i++){
    if(Math.random()>.4){const py=marioPlatforms.find(p=>p.x>=i*100-50&&p.x<=i*100+50);const cy=py?(py.y-40):(GY-30);marioCoins.push({x:i*100+R(10,80),y:cy-R(10,30),collected:false})}
  }
  // Enemies
  for(let i=4;i<50;i++){
    if(Math.random()>.65) marioEnemies.push({x:i*100+R(20,70),y:GY-20,alive:true,dir:-1,startX:i*100+20});
  }
  mario.y=GY-30;
  // Controls
  const lb=document.getElementById('mario-left'),rb=document.getElementById('mario-right'),jb=document.getElementById('mario-jump-btn');
  function hold(btn,key){
    btn.ontouchstart=btn.onmousedown=function(e){e.preventDefault();marioKeys[key]=true};
    btn.ontouchend=btn.onmouseup=btn.ontouchcancel=function(e){e.preventDefault();marioKeys[key]=false};
  }
  hold(lb,'left');hold(rb,'right');
  jb.ontouchstart=jb.onmousedown=function(e){e.preventDefault();ea();if(!runAlive){initRunner();return}if(mario.onGround){mario.vy=MARIO_JUMP;mario.onGround=false;tone(500,.08)}};
  // Keyboard
  document.onkeydown=function(e){
    if(curGame!=='runner')return;
    if(e.key==='ArrowLeft')marioKeys.left=true;
    if(e.key==='ArrowRight')marioKeys.right=true;
    if((e.key==='ArrowUp'||e.key===' ')&&mario.onGround){mario.vy=MARIO_JUMP;mario.onGround=false;tone(500,.08)}
  };
  document.onkeyup=function(e){
    if(e.key==='ArrowLeft')marioKeys.left=false;
    if(e.key==='ArrowRight')marioKeys.right=false;
  };
  if(runAF)cancelAnimationFrame(runAF);
  marioLoop();
}
function stopRunner(){if(runAF){cancelAnimationFrame(runAF);runAF=null}}
function marioLoop(){
  if(curGame!=='runner')return;
  const c=runCtx,W=runCanvas.width,H=runCanvas.height;
  runFrame++;
  if(runAlive){
    // Horizontal movement
    if(marioKeys.left){mario.vx=-MARIO_SPD;mario.facing=-1}
    else if(marioKeys.right){mario.vx=MARIO_SPD;mario.facing=1}
    else mario.vx=0;
    mario.x+=mario.vx;
    if(mario.x<10)mario.x=10;
    // Gravity
    mario.vy+=MARIO_G;
    mario.y+=mario.vy;
    mario.onGround=false;
    // Platform collision
    for(const p of marioPlatforms){
      if(mario.x+14>p.x&&mario.x-14<p.x+p.w&&mario.y+24>p.y&&mario.y+24<p.y+p.h+8&&mario.vy>=0){
        mario.y=p.y-24;mario.vy=0;mario.onGround=true;break;
      }
    }
    // Fall death
    if(mario.y>H+50){runAlive=false;sndNo();document.getElementById('run-info').textContent='Dusme! Skor: '+runScore3}
    // Coin collection
    marioCoins.forEach(coin=>{if(!coin.collected&&Math.abs(mario.x-coin.x)<20&&Math.abs(mario.y-coin.y)<24){coin.collected=true;runScore3++;document.getElementById('runner-score').textContent='Skor: '+runScore3;sndOk();tone(800,.08);setTimeout(()=>tone(1000,.08),60)}});
    // Enemy movement & collision
    marioEnemies.forEach(en=>{
      if(!en.alive)return;
      en.x+=en.dir*0.8;if(en.x<en.startX-40||en.x>en.startX+40)en.dir*=-1;
      if(Math.abs(mario.x-en.x)<18&&Math.abs(mario.y-en.y)<20){
        if(mario.vy>0&&mario.y<en.y){en.alive=false;mario.vy=MARIO_JUMP*.6;runScore3+=2;document.getElementById('runner-score').textContent='Skor: '+runScore3;sndOk()}
        else{runAlive=false;sndNo();document.getElementById('run-info').textContent='Skor: '+runScore3}
      }
    });
    // Camera follows mario
    cameraX=mario.x-W*0.3;if(cameraX<0)cameraX=0;
  }
  // DRAW
  c.save();
  // Sky gradient
  const skyG=c.createLinearGradient(0,0,0,H);skyG.addColorStop(0,'#74b9ff');skyG.addColorStop(1,'#a29bfe');
  c.fillStyle=skyG;c.fillRect(0,0,W,H);
  // Clouds
  c.fillStyle='rgba(255,255,255,.6)';
  for(let i=0;i<8;i++){const cx=(i*200-cameraX*.2+1000)%1600-200;c.beginPath();c.arc(cx,30+i*8%40,18,0,Math.PI*2);c.arc(cx+20,25+i*8%40,24,0,Math.PI*2);c.fill()}
  // Hills background
  c.fillStyle='#55efc4';
  for(let i=0;i<10;i++){const hx=i*250-cameraX*.3;c.beginPath();c.arc(hx,H,80,Math.PI,0);c.fill()}
  c.translate(-cameraX,0);
  // Platforms
  marioPlatforms.forEach(p=>{
    if(p.x+p.w<cameraX-50||p.x>cameraX+W+50)return;
    if(p.type==='ground'){
      c.fillStyle='#b07940';c.fillRect(p.x,p.y,p.w,p.h);
      c.fillStyle='#2ecc71';c.fillRect(p.x,p.y,p.w,8);
    }else{
      c.fillStyle='#c0392b';c.fillRect(p.x,p.y,p.w,p.h);
      c.strokeStyle='#e74c3c';c.lineWidth=2;
      for(let bx=p.x;bx<p.x+p.w;bx+=20){c.strokeRect(bx,p.y,20,p.h)}
    }
  });
  // Coins
  c.font='20px serif';c.textAlign='center';c.textBaseline='middle';
  marioCoins.forEach(coin=>{if(!coin.collected){const bounce=Math.sin(runFrame*.08+coin.x)*3;c.fillText('🪙',coin.x,coin.y+bounce)}});
  // Enemies (goombas)
  marioEnemies.forEach(en=>{if(en.alive){c.fillText('🍄',en.x,en.y)}});
  // Mario character
  const HW=52,HH=62;
  if(heroLoaded){
    c.save();
    if(runAlive){
      if(mario.facing<0){c.translate(mario.x,mario.y+24-HH);c.scale(-1,1);c.drawImage(heroImg,-HW/2,0,HW,HH)}
      else{c.drawImage(heroImg,mario.x-HW/2,mario.y+24-HH,HW,HH)}
    }else{
      c.globalAlpha=.6;c.drawImage(heroImg,mario.x-HW/2,mario.y+24-HH,HW,HH);c.globalAlpha=1;
    }
    c.restore();
  }else{
    c.font='26px serif';c.textAlign='center';c.textBaseline='bottom';
    if(runAlive)c.fillText('🏃',mario.x,mario.y+24);
    else c.fillText('😵',mario.x,mario.y+24);
  }
  c.restore();
  // Game over overlay
  if(!runAlive){
    c.fillStyle='rgba(0,0,0,.4)';c.fillRect(0,0,W,H);
    c.fillStyle='#fff';c.font='bold 18px Nunito,sans-serif';c.textAlign='center';c.textBaseline='middle';
    c.fillText('Oyun Bitti! Skor: '+runScore3,W/2,H/2-15);
    c.font='14px Nunito,sans-serif';c.fillText('Tekrar: ZIPLA butonuna bas',W/2,H/2+15);
  }
  runAF=requestAnimationFrame(marioLoop);
}

// ===== 7. RENK ESLESTIRME =====
let renkScore=0,renkLocked=false;
const shapes=[{s:'daire',d:'●'},{s:'kare',d:'■'},{s:'ucgen',d:'▲'},{s:'yildiz',d:'★'}];
const renkler=[{n:'kirmizi',c:'#e74c3c'},{n:'mavi',c:'#3498db'},{n:'yesil',c:'#2ecc71'},{n:'sari',c:'#f1c40f'},{n:'turuncu',c:'#e67e22'},{n:'mor',c:'#9b59b6'}];
function initRenk(){renkScore=0;document.getElementById('renk-score-display').textContent='0';newRenkRound()}
function newRenkRound(){
  renkLocked=false;
  const isColor=Math.random()>.4;
  const targetRenk=renkler[R(0,renkler.length-1)];
  const targetShape=shapes[R(0,shapes.length-1)];
  let prompt,matchFn;
  if(isColor){prompt=targetRenk.n.charAt(0).toUpperCase()+targetRenk.n.slice(1)+' olanini bul!';matchFn=item=>item.renk.n===targetRenk.n}
  else{prompt=targetShape.s.charAt(0).toUpperCase()+targetShape.s.slice(1)+' bul!';matchFn=item=>item.shape.s===targetShape.s}
  document.getElementById('renk-target').textContent=prompt;
  const grid=document.getElementById('renk-grid');grid.innerHTML='';
  const items=[];
  // ensure at least one correct
  items.push({renk:isColor?targetRenk:renkler[R(0,renkler.length-1)],shape:isColor?shapes[R(0,shapes.length-1)]:targetShape});
  while(items.length<6){
    const r=renkler[R(0,renkler.length-1)],s=shapes[R(0,shapes.length-1)];
    items.push({renk:r,shape:s});
  }
  sh(items);
  items.forEach(item=>{
    const el=document.createElement('div');el.className='renk-item';el.style.background='rgba(255,255,255,.15)';
    el.innerHTML=`<span style="color:${item.renk.c}">${item.shape.d}</span>`;
    el.addEventListener('click',()=>{
      if(renkLocked)return;
      if(matchFn(item)){renkLocked=true;el.classList.add('ok');sndOk();confetti();showFB(true);renkScore++;document.getElementById('renk-score-display').textContent=renkScore;setTimeout(newRenkRound,800)}
      else{el.classList.add('no');sndNo();setTimeout(()=>el.classList.remove('no'),400)}
    });
    grid.appendChild(el);
  });
}

// ===== 8. HAYVAN SESLERI =====
let hayvanScore=0,hayvanLocked=false,hayvanCurrent=null;
const animals=[
  {n:'Kedi',e:'🐱'},{n:'Kopek',e:'🐶'},{n:'Inek',e:'🐄'},{n:'Horoz',e:'🐓'},
  {n:'Koyun',e:'🐑'},{n:'Kus',e:'🐦'},{n:'Aslan',e:'🦁'},{n:'Fil',e:'🐘'}
];
function playAnimalSound(animal){
  ea();
  const t=ac.currentTime;
  if(animal.n==='Kedi'){
    // Meow: gliding sine
    const o=ac.createOscillator(),g=ac.createGain();o.type='sine';
    o.frequency.setValueAtTime(700,t);o.frequency.exponentialRampToValueAtTime(500,t+.15);o.frequency.exponentialRampToValueAtTime(380,t+.4);
    g.gain.setValueAtTime(.2,t);g.gain.linearRampToValueAtTime(.25,t+.1);g.gain.exponentialRampToValueAtTime(.001,t+.5);
    o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+.5);
    // second meow
    const o2=ac.createOscillator(),g2=ac.createGain();o2.type='sine';
    o2.frequency.setValueAtTime(650,t+.55);o2.frequency.exponentialRampToValueAtTime(450,t+.7);o2.frequency.exponentialRampToValueAtTime(350,t+.95);
    g2.gain.setValueAtTime(0,t+.55);g2.gain.linearRampToValueAtTime(.22,t+.6);g2.gain.exponentialRampToValueAtTime(.001,t+1);
    o2.connect(g2);g2.connect(ac.destination);o2.start(t+.55);o2.stop(t+1);
  }
  else if(animal.n==='Kopek'){
    // Bark: short percussive
    for(let i=0;i<2;i++){const st=t+i*.35;
      const o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';
      o.frequency.setValueAtTime(350,st);o.frequency.exponentialRampToValueAtTime(200,st+.12);
      g.gain.setValueAtTime(.22,st);g.gain.exponentialRampToValueAtTime(.001,st+.15);
      o.connect(g);g.connect(ac.destination);o.start(st);o.stop(st+.15);
      // noise burst
      const n=ac.createOscillator(),ng=ac.createGain();n.type='square';n.frequency.value=150+R(0,50);
      ng.gain.setValueAtTime(.08,st);ng.gain.exponentialRampToValueAtTime(.001,st+.08);
      n.connect(ng);ng.connect(ac.destination);n.start(st);n.stop(st+.08);
    }
  }
  else if(animal.n==='Inek'){
    // Moo: long low tone with vibrato
    const o=ac.createOscillator(),g=ac.createGain(),lfo=ac.createOscillator(),lfoG=ac.createGain();
    o.type='sawtooth';o.frequency.setValueAtTime(140,t);o.frequency.linearRampToValueAtTime(125,t+.3);o.frequency.linearRampToValueAtTime(135,t+.8);
    lfo.frequency.value=5;lfoG.gain.value=8;lfo.connect(lfoG);lfoG.connect(o.frequency);lfo.start(t);lfo.stop(t+1);
    g.gain.setValueAtTime(.15,t);g.gain.linearRampToValueAtTime(.2,t+.2);g.gain.linearRampToValueAtTime(.18,t+.6);g.gain.exponentialRampToValueAtTime(.001,t+1);
    o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+1);
  }
  else if(animal.n==='Horoz'){
    // Cock-a-doodle-doo: rising then falling
    const freqs=[500,800,1000,900,700,500];const dur=.12;
    freqs.forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type='sine';
      o.frequency.setValueAtTime(f,t+i*dur);g.gain.setValueAtTime(i<3?.2:.15,t+i*dur);g.gain.exponentialRampToValueAtTime(.001,t+i*dur+dur);
      o.connect(g);g.connect(ac.destination);o.start(t+i*dur);o.stop(t+i*dur+dur+.02);
    });
  }
  else if(animal.n==='Koyun'){
    // Baa: vibrato triangle
    for(let i=0;i<2;i++){const st=t+i*.4;
      const o=ac.createOscillator(),g=ac.createGain(),lfo=ac.createOscillator(),lg=ac.createGain();
      o.type='triangle';o.frequency.setValueAtTime(350,st);o.frequency.linearRampToValueAtTime(300,st+.3);
      lfo.frequency.value=8;lg.gain.value=15;lfo.connect(lg);lg.connect(o.frequency);lfo.start(st);lfo.stop(st+.35);
      g.gain.setValueAtTime(.18,st);g.gain.exponentialRampToValueAtTime(.001,st+.35);
      o.connect(g);g.connect(ac.destination);o.start(st);o.stop(st+.35);
    }
  }
  else if(animal.n==='Kus'){
    // Tweet: high chirps
    for(let i=0;i<4;i++){const st=t+i*.15;
      const o=ac.createOscillator(),g=ac.createGain();o.type='sine';
      o.frequency.setValueAtTime(1800+R(-200,200),st);o.frequency.exponentialRampToValueAtTime(1200+R(-100,100),st+.08);
      g.gain.setValueAtTime(.12,st);g.gain.exponentialRampToValueAtTime(.001,st+.1);
      o.connect(g);g.connect(ac.destination);o.start(st);o.stop(st+.1);
    }
  }
  else if(animal.n==='Aslan'){
    // Roar: low aggressive
    const o=ac.createOscillator(),g=ac.createGain(),o2=ac.createOscillator(),g2=ac.createGain();
    o.type='sawtooth';o.frequency.setValueAtTime(100,t);o.frequency.linearRampToValueAtTime(130,t+.2);o.frequency.linearRampToValueAtTime(80,t+.8);
    g.gain.setValueAtTime(.2,t);g.gain.linearRampToValueAtTime(.3,t+.15);g.gain.exponentialRampToValueAtTime(.001,t+.9);
    o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+.9);
    o2.type='sawtooth';o2.frequency.setValueAtTime(105,t);o2.frequency.linearRampToValueAtTime(135,t+.2);o2.frequency.linearRampToValueAtTime(82,t+.8);
    g2.gain.setValueAtTime(.12,t);g2.gain.linearRampToValueAtTime(.18,t+.15);g2.gain.exponentialRampToValueAtTime(.001,t+.85);
    o2.connect(g2);g2.connect(ac.destination);o2.start(t);o2.stop(t+.85);
  }
  else if(animal.n==='Fil'){
    // Trumpet: brass-like rising
    const o=ac.createOscillator(),g=ac.createGain();o.type='square';
    o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(500,t+.3);o.frequency.linearRampToValueAtTime(450,t+.5);o.frequency.exponentialRampToValueAtTime(250,t+.8);
    g.gain.setValueAtTime(.1,t);g.gain.linearRampToValueAtTime(.2,t+.15);g.gain.linearRampToValueAtTime(.15,t+.5);g.gain.exponentialRampToValueAtTime(.001,t+.85);
    o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+.85);
  }
}
function initHayvan(){hayvanScore=0;document.getElementById('hayvan-score-display').textContent='0';newHayvanRound()}
function newHayvanRound(){
  hayvanLocked=false;
  const correct=animals[R(0,animals.length-1)];hayvanCurrent=correct;
  // pick 3 wrong
  const wrong=sh(animals.filter(a=>a.n!==correct.n)).slice(0,3);
  const opts=sh([correct,...wrong]);
  document.getElementById('hayvan-prompt').textContent='Bu hangi hayvan?';
  const grid=document.getElementById('hayvan-grid');grid.innerHTML='';
  opts.forEach(a=>{
    const card=document.createElement('div');card.className='hayvan-card';
    card.innerHTML=`<div class="he">${a.e}</div><div class="hn">${a.n}</div>`;
    card.addEventListener('click',()=>{
      if(hayvanLocked)return;
      if(a.n===correct.n){hayvanLocked=true;card.classList.add('ok');sndOk();confetti();showFB(true);hayvanScore++;document.getElementById('hayvan-score-display').textContent=hayvanScore;setTimeout(newHayvanRound,900)}
      else{card.classList.add('no');sndNo();showFB(false);setTimeout(()=>card.classList.remove('no'),400)}
    });
    grid.appendChild(card);
  });
  document.getElementById('play-sound-btn').onclick=()=>playAnimalSound(correct);
  setTimeout(()=>playAnimalSound(correct),300);
}
