<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Eglence Oyunlari</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;user-select:none;-webkit-user-select:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.screen{display:none !important;flex-direction:column;height:100%}
.screen.active{display:flex !important}

/* LOGIN */
#login{align-items:center;justify-content:center;padding:20px;gap:12px;overflow-y:auto}
#login h1{font-size:min(1.8em,7vw);text-shadow:3px 3px 0 rgba(0,0,0,.2)}
#login .avatars{display:flex;gap:12px;margin:10px 0}
#login .av{font-size:2.2em;width:56px;height:56px;border-radius:50%;border:4px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s,border-color .12s}
#login .av.sel{border-color:#fff;transform:scale(1.15);box-shadow:0 0 20px rgba(255,255,255,.4)}
#login input{font-family:'Nunito',sans-serif;font-size:1.2em;font-weight:700;padding:12px 20px;border-radius:14px;border:3px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);color:#fff;text-align:center;width:220px;outline:none}
#login input::placeholder{color:rgba(255,255,255,.5)}
#login .play-btn{font-family:'Nunito',sans-serif;font-size:1.3em;font-weight:900;padding:14px 40px;border-radius:16px;border:none;background:#fff;color:#764ba2;cursor:pointer;margin-top:6px;transition:transform .1s}
#login .play-btn:active{transform:scale(.95)}

/* MENU */
#menu{align-items:center;padding:12px;gap:6px}
.menu-header{display:flex;align-items:center;gap:10px;padding:4px 10px;width:100%;max-width:400px}
.menu-avatar{font-size:1.8em;cursor:pointer}
.menu-name{font-size:min(1.1em,4.5vw);font-weight:900;flex:1}
.menu-stars{font-size:min(.9em,3.5vw);color:#ffd93d}
.gg{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:400px;width:100%;overflow-y:auto;max-height:calc(100vh - 80px);padding:4px}
.gc{background:rgba(255,255,255,.18);backdrop-filter:blur(6px);border:2px solid rgba(255,255,255,.3);border-radius:16px;padding:10px 6px;text-align:center;cursor:pointer;transition:transform .12s}
.gc:active{transform:scale(.95)}
.gc .gi{font-size:min(2em,8vw)}
.gc .gl{font-size:min(.75em,3vw);margin-top:2px;font-weight:700}
.gc .gs{font-size:min(.6em,2.5vw);color:#ffd93d;margin-top:1px}

/* TOP BAR */
.tb{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:rgba(0,0,0,.18);min-height:48px;flex-shrink:0}
.tb .bb{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:1.3em;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.tb .tt{font-size:min(1em,4vw);font-weight:900}
.tb .ts{font-size:min(.9em,3.5vw)}
.ga{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;position:relative;overflow:hidden}

/* FEEDBACK */
.fb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:min(2em,8vw);font-weight:900;padding:14px 28px;border-radius:18px;z-index:100;pointer-events:none;animation:fpop .6s forwards;text-shadow:2px 2px 0 rgba(0,0,0,.15)}
.fb.ok{background:rgba(0,184,148,.9)}.fb.no{background:rgba(214,48,49,.85)}
@keyframes fpop{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.15);opacity:1}70%{transform:translate(-50%,-50%) scale(1)}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
.cf{position:fixed;width:10px;height:10px;z-index:200;pointer-events:none;animation:cfall 1s forwards}
@keyframes cfall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.lc{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;animation:fi .3s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.lc h2{font-size:min(2em,8vw)}.lc .sb{font-size:min(2.5em,10vw);margin:8px 0}
.lc button{font-family:'Nunito',sans-serif;font-size:1.1em;font-weight:900;padding:12px 30px;border-radius:14px;border:none;background:#fff;color:#764ba2;cursor:pointer;margin:6px}

/* 1. BOYAMA */
#boyama-game{background:linear-gradient(180deg,#dfe6e9,#b2bec3)}
#boyama-game .ga{padding:0;justify-content:flex-start;overflow:visible}
.draw-canvas{width:100%;flex:1;background:#fff;cursor:crosshair;touch-action:none;min-height:0}
.draw-toolbar{display:flex;flex-direction:column;gap:4px;padding:6px 8px;background:rgba(0,0,0,.12);width:100%;flex-shrink:0}
.draw-row{display:flex;gap:5px;justify-content:center;flex-wrap:wrap}
.cbtn{width:min(38px,9vw);height:min(38px,9vw);border-radius:50%;border:3px solid rgba(255,255,255,.5);cursor:pointer;transition:transform .1s;flex-shrink:0}
.cbtn:active,.cbtn.sel{transform:scale(1.15);border-color:#fff;box-shadow:0 0 8px rgba(0,0,0,.3)}
.tbtn{min-width:min(40px,10vw);height:min(38px,9vw);border-radius:12px;border:2px solid rgba(255,255,255,.4);background:rgba(255,255,255,.2);color:#333;font-size:min(1.1em,4vw);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0 6px;flex-shrink:0}
.tbtn:active,.tbtn.sel{background:rgba(255,255,255,.55)}

/* 2. HAFIZA */
#hafiza-game{background:linear-gradient(180deg,#a29bfe,#6c5ce7)}
.card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:380px;width:100%}
.mcard{aspect-ratio:1;border-radius:14px;cursor:pointer;perspective:600px;font-size:min(2em,8vw)}
.mcard-inner{position:relative;width:100%;height:100%;transition:transform .4s;transform-style:preserve-3d}
.mcard.flipped .mcard-inner{transform:rotateY(180deg)}
.mcard-front,.mcard-back{position:absolute;width:100%;height:100%;border-radius:14px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden}
.mcard-front{background:linear-gradient(135deg,#fd79a8,#e84393);font-size:1.2em}
.mcard-back{background:rgba(255,255,255,.25);transform:rotateY(180deg)}
.mcard.matched .mcard-back{background:rgba(0,184,148,.4)}
.mem-info{font-size:1em;margin-bottom:8px;text-align:center}

/* 3. MUZIK */
#muzik-game{background:linear-gradient(180deg,#fd79a8,#e84393)}
.piano{display:flex;gap:4px;width:100%;max-width:400px;justify-content:center;margin:10px 0}
.pkey{flex:1;min-height:120px;border-radius:0 0 12px 12px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-size:min(.8em,3vw);font-weight:900;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:12px;transition:filter .1s,transform .1s}
.pkey:active,.pkey.lit{filter:brightness(1.3);transform:scaleY(.97)}
.simon-display{font-size:1.1em;font-weight:700;min-height:2.5em;text-align:center;margin:8px 0;line-height:1.3}
.mode-btns{display:flex;gap:8px;margin-bottom:10px}
.mode-btns button{font-family:'Nunito',sans-serif;font-size:.9em;font-weight:700;padding:8px 16px;border-radius:10px;border:2px solid rgba(255,255,255,.5);background:rgba(255,255,255,.2);color:#fff;cursor:pointer}
.mode-btns button.sel{background:rgba(255,255,255,.4)}

/* 4. MARIO */
#runner-game{background:linear-gradient(180deg,#74b9ff,#0984e3)}
#runner-game .ga{padding:6px;gap:6px}
.run-canvas{border-radius:12px;width:100%;max-width:500px;height:280px}
.run-info{font-size:1.2em;font-weight:700}
.mario-controls{display:flex;gap:16px;align-items:center;justify-content:space-between;width:100%;max-width:400px;padding:0 10px}
.mario-lr{display:flex;gap:6px}
.mario-lr button,.mario-jump{width:60px;height:60px;border-radius:16px;border:none;background:rgba(255,255,255,.35);color:#fff;font-size:1.6em;cursor:pointer;font-family:'Nunito',sans-serif}
.mario-lr button:active,.mario-jump:active{background:rgba(255,255,255,.6);transform:scale(.93)}
.mario-jump{width:80px;height:80px;border-radius:50%;font-size:1.2em;background:rgba(255,80,80,.5)}

/* 5. BALON MATEMATIK */
#balon-game{background:linear-gradient(180deg,#55efc4,#00b894)}
.balon-area{position:relative;width:100%;flex:1;overflow:hidden}
.balon{position:absolute;cursor:pointer;transition:transform .08s}
.balon:active{transform:scale(.85)}
.balon.pop{animation:bpop .3s forwards}
@keyframes bpop{0%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}100%{transform:scale(0);opacity:0}}
.balon-hud{display:flex;flex-direction:column;align-items:center;gap:4px;width:100%;padding:4px 10px}
.balon-question{font-size:min(2em,8vw);font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,.15)}
.balon-progress{font-size:min(.9em,3.5vw);opacity:.8}

/* 6. ARABA YARISI */
#araba-game{background:linear-gradient(180deg,#636e72,#2d3436)}
#araba-game .ga{padding:4px;gap:4px;justify-content:flex-start}
.araba-canvas{width:100%;max-width:400px;border-radius:12px;flex:1;min-height:0}

/* 7. GOKKUSAGI BOYA */
#gok-game{background:linear-gradient(180deg,#dfe6e9,#b2bec3)}
#gok-game .ga{padding:8px;gap:8px;overflow-y:auto}
.gok-template{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;max-width:360px}
.gok-row{display:flex;gap:0;width:100%}
.gok-cell{flex:1;height:min(48px,8vh);border:2px solid rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:min(1.5em,5vw);transition:background .3s}
.gok-cell.done{opacity:1;cursor:default}.gok-cell.wrong{animation:shake .4s}
.gok-colors{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.gok-cbtn{width:min(44px,10vw);height:min(44px,10vw);border-radius:50%;border:4px solid rgba(255,255,255,.4);cursor:pointer;transition:transform .1s}
.gok-cbtn:active,.gok-cbtn.sel{transform:scale(1.15);border-color:#fff;box-shadow:0 0 10px rgba(0,0,0,.3)}
.gok-info{font-size:min(1em,4vw);font-weight:700;text-align:center;color:#333}

/* 8. UZAY MACERASI */
#uzay-game{background:linear-gradient(180deg,#2d3436,#0a0a2e)}
#uzay-game .ga{padding:4px;gap:4px;justify-content:flex-start}
.uzay-canvas{width:100%;max-width:400px;border-radius:12px;flex:1;min-height:0}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <h1>Eglence Oyunlari</h1>
  <div style="font-size:1.1em;opacity:.8">Avatarini sec!</div>
  <div class="avatars" id="avatars">
    <div class="av sel" data-av="👦">👦</div>
    <div class="av" data-av="👧">👧</div>
    <div class="av" data-av="🦸">🦸</div>
    <div class="av" data-av="🧒">🧒</div>
  </div>
  <input type="text" id="name-input" placeholder="Adini yaz..." maxlength="12">
  <button class="play-btn" id="play-btn">Oyna!</button>
</div>

<!-- MENU -->
<div id="menu" class="screen">
  <div class="menu-header">
    <span class="menu-avatar" id="menu-avatar">👦</span>
    <span class="menu-name" id="menu-name">Merhaba!</span>
    <span class="menu-stars" id="menu-stars"></span>
  </div>
  <div class="gg" id="game-grid">
    <div class="gc" data-game="boyama"><div class="gi">🎨</div><div class="gl">Boyama</div><div class="gs" data-hs="boyama"></div></div>
    <div class="gc" data-game="hafiza"><div class="gi">🧩</div><div class="gl">Hafiza</div><div class="gs" data-hs="hafiza"></div></div>
    <div class="gc" data-game="muzik"><div class="gi">🎵</div><div class="gl">Piyano</div><div class="gs" data-hs="muzik"></div></div>
    <div class="gc" data-game="runner"><div class="gi">🍄</div><div class="gl">Super Mario</div><div class="gs" data-hs="runner"></div></div>
    <div class="gc" data-game="balon"><div class="gi">🫧</div><div class="gl">Balon Matematik</div><div class="gs" data-hs="balon"></div></div>
    <div class="gc" data-game="araba"><div class="gi">🏎️</div><div class="gl">Araba Yarisi</div><div class="gs" data-hs="araba"></div></div>
    <div class="gc" data-game="gok"><div class="gi">🌈</div><div class="gl">Gokkusagi Boya</div><div class="gs" data-hs="gok"></div></div>
    <div class="gc" data-game="uzay"><div class="gi">🚀</div><div class="gl">Uzay Macerasi</div><div class="gs" data-hs="uzay"></div></div>
  </div>
</div>

<!-- 1. BOYAMA -->
<div id="boyama-game" class="screen">
  <div class="tb"><button class="bb">&#9664;</button><span class="tt">🎨 Boyama</span><span></span></div>
  <div class="ga">
    <canvas class="draw-canvas" id="draw-canvas"></canvas>
    <div class="draw-toolbar" id="draw-toolbar"></div>
  </div>
</div>

<!-- 2. HAFIZA -->
<div id="hafiza-game" class="screen">
  <div class="tb"><button class="bb">&#9664;</button><span class="tt">🧩 Hafiza</span><span class="ts" id="mem-score"></span></div>
  <div class="ga"><div class="mem-info" id="mem-info"></div><div class="card-grid" id="card-grid"></div></div>
</div>

<!-- 3. MUZIK -->
<div id="muzik-game" class="screen">
  <div class="tb"><button class="bb">&#9664;</button><span class="tt">🎵 Piyano</span><span class="ts" id="muzik-score"></span></div>
  <div class="ga">
    <div class="mode-btns" id="mode-btns"><button class="sel" data-mode="free">Serbest</button><button data-mode="melodi">Melodi</button></div>
    <div class="simon-display" id="simon-display"></div>
    <div class="piano" id="piano"></div>
  </div>
</div>

<!-- 4. MARIO -->
<div id="runner-game" class="screen">
  <div class="tb"><button class="bb">&#9664;</button><span class="tt">🍄 Mario</span><span class="ts" id="runner-score">Skor: 0</span></div>
  <div class="ga" id="runner-tap">
    <canvas class="run-canvas" id="run-canvas"></canvas>
    <div class="run-info" id="run-info"></div>
    <div class="mario-controls">
      <div class="mario-lr"><button id="mario-left">&#9664;</button><button id="mario-right">&#9654;</button></div>
      <button class="mario-jump" id="mario-jump-btn">ZIPLA</button>
    </div>
  </div>
</div>

<!-- 5. BALON MATEMATIK -->
<div id="balon-game" class="screen">
  <div class="tb"><button class="bb">&#9664;</button><span class="tt">🫧 Balon Matematik</span><span class="ts" id="balon-score">Seviye 1</span></div>
  <div class="ga">
    <div class="balon-hud">
      <span class="balon-question" id="balon-question"></span>
      <span class="balon-progress" id="balon-progress"></span>
    </div>
    <div class="balon-area" id="balon-area"></div>
  </div>
</div>

<!-- 6. ARABA YARISI -->
<div id="araba-game" class="screen">
  <div class="tb"><button class="bb">&#9664;</button><span class="tt">🏎️ Araba Yarisi</span><span class="ts" id="araba-score">0</span></div>
  <div class="ga">
    <canvas class="araba-canvas" id="araba-canvas"></canvas>
  </div>
</div>

<!-- 7. GOKKUSAGI BOYA -->
<div id="gok-game" class="screen">
  <div class="tb"><button class="bb">&#9664;</button><span class="tt">🌈 Gokkusagi Boya</span><span class="ts" id="gok-score"></span></div>
  <div class="ga">
    <div class="gok-info" id="gok-info"></div>
    <div class="gok-template" id="gok-template"></div>
    <div class="gok-colors" id="gok-colors"></div>
  </div>
</div>

<!-- 8. UZAY MACERASI -->
<div id="uzay-game" class="screen">
  <div class="tb"><button class="bb">&#9664;</button><span class="tt">🚀 Uzay Macerasi</span><span class="ts" id="uzay-score">0</span></div>
  <div class="ga">
    <canvas class="uzay-canvas" id="uzay-canvas"></canvas>
  </div>
</div>

<script>
// ===== AUDIO =====
const AC=window.AudioContext||window.webkitAudioContext;let ac;
function ea(){if(!ac)ac=new AC()}
function tone(f,d,t='sine',v=.18){ea();const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}
function sndOk(){tone(523,.1);setTimeout(()=>tone(659,.1),80);setTimeout(()=>tone(784,.18),160)}
function sndNo(){tone(200,.22,'sawtooth')}
function sndPop(){tone(900,.07)}

// ===== HELPERS =====
function R(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function sh(a){for(let i=a.length-1;i>0;i--){const j=R(0,i);[a[i],a[j]]=[a[j],a[i]]}return a}
function showFB(ok){const e=document.createElement('div');e.className='fb '+(ok?'ok':'no');e.textContent=ok?'Aferin! 🎉':'Tekrar dene! 💪';document.body.appendChild(e);setTimeout(()=>e.remove(),700)}
function confetti(){const c=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6b9d','#c084fc'];for(let i=0;i<25;i++){const e=document.createElement('div');e.className='cf';e.style.left=R(5,95)+'%';e.style.top=R(-5,5)+'%';e.style.background=c[R(0,5)];e.style.borderRadius=Math.random()>.5?'50%':'2px';e.style.width=R(6,11)+'px';e.style.height=R(6,11)+'px';e.style.animationDuration=(.7+Math.random()*.6)+'s';e.style.animationDelay=(Math.random()*.2)+'s';document.body.appendChild(e);setTimeout(()=>e.remove(),1500)}}

// ===== USER & SCORES =====
const LS_KEY='eglence_user';
function loadUser(){try{return JSON.parse(localStorage.getItem(LS_KEY))}catch(e){return null}}
function saveUser(u){localStorage.setItem(LS_KEY,JSON.stringify(u))}
function saveScore(game,score){
  const u=loadUser();if(!u)return;
  if(!u.scores)u.scores={};
  if(!u.scores[game]||score>u.scores[game])u.scores[game]=score;
  saveUser(u);updateMenuScores();
}
function totalStars(){const u=loadUser();if(!u||!u.scores)return 0;return Object.values(u.scores).reduce((a,b)=>a+Math.floor(b/5),0)}
function updateMenuScores(){
  const u=loadUser();if(!u)return;
  document.getElementById('menu-stars').textContent='⭐ '+totalStars();
  document.querySelectorAll('[data-hs]').forEach(el=>{
    const g=el.dataset.hs;const s=u.scores&&u.scores[g];
    el.textContent=s?'En yuksek: '+s:'';
  });
}

// ===== LOGIN =====
let selectedAvatar='👦';
document.querySelectorAll('#avatars .av').forEach(a=>{
  a.addEventListener('click',()=>{
    document.querySelectorAll('#avatars .av').forEach(x=>x.classList.remove('sel'));
    a.classList.add('sel');selectedAvatar=a.dataset.av;
  });
});
document.getElementById('play-btn').addEventListener('click',()=>{
  const name=document.getElementById('name-input').value.trim()||'Oyuncu';
  const u=loadUser()||{scores:{}};
  u.name=name;u.avatar=selectedAvatar;
  saveUser(u);enterMenu();
});
function enterMenu(){
  const u=loadUser();
  if(u){
    document.getElementById('menu-avatar').textContent=u.avatar||'👦';
    document.getElementById('menu-name').textContent='Merhaba, '+u.name+'!';
    updateMenuScores();
  }
  showScr('menu');
}
window.addEventListener('load',()=>{const u=loadUser();if(u&&u.name){
  document.getElementById('name-input').value=u.name;
  selectedAvatar=u.avatar||'👦';
  document.querySelectorAll('#avatars .av').forEach(a=>{a.classList.toggle('sel',a.dataset.av===selectedAvatar)});
  enterMenu();
}});
document.getElementById('menu-avatar').addEventListener('click',()=>{showScr('login')});

// ===== NAV =====
let curGame=null;
function showScr(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function goMenu(){
  if(curGame==='runner')stopRunner();
  if(curGame==='balon')stopBalon();
  if(curGame==='araba')stopAraba();
  if(curGame==='uzay')stopUzay();
  document.querySelectorAll('.lc').forEach(e=>e.remove());curGame=null;enterMenu();
}
function startGame(g){curGame=g;showScr(g+'-game');switch(g){
  case'boyama':initBoyama();break;case'hafiza':initHafiza();break;case'muzik':initMuzik();break;
  case'runner':initRunner();break;case'balon':initBalon();break;
  case'araba':initAraba();break;case'gok':initGok();break;case'uzay':initUzay();break;
}}
document.querySelectorAll('.gc').forEach(c=>{c.addEventListener('click',()=>startGame(c.dataset.game))});
document.querySelectorAll('.bb').forEach(b=>{b.addEventListener('click',goMenu)});

// ===== 1. BOYAMA =====
let drawCtx,drawing=false,drawColor='#e74c3c',drawSize=5,erasing=false,drawShape=null;
const drawColors=['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#e84393','#2d3436','#fff'];
function initBoyama(){
  const cv=document.getElementById('draw-canvas');
  const rect=cv.parentElement.getBoundingClientRect();
  cv.width=rect.width;cv.height=rect.height-90;
  drawCtx=cv.getContext('2d');drawCtx.fillStyle='#fff';drawCtx.fillRect(0,0,cv.width,cv.height);
  drawCtx.lineCap='round';drawCtx.lineJoin='round';drawShape=null;erasing=false;
  const bar=document.getElementById('draw-toolbar');bar.innerHTML='';
  const row1=document.createElement('div');row1.className='draw-row';
  drawColors.forEach(c=>{const b=document.createElement('div');b.className='cbtn'+(c===drawColor?' sel':'');b.style.background=c;if(c==='#fff')b.style.border='3px solid #bbb';
    b.addEventListener('click',()=>{erasing=false;drawShape=null;drawColor=c;bar.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');bar.querySelectorAll('.tbtn').forEach(x=>x.classList.remove('sel'))});
    row1.appendChild(b)});
  bar.appendChild(row1);
  const row2=document.createElement('div');row2.className='draw-row';
  function addTool(txt,fn){const t=document.createElement('div');t.className='tbtn';t.textContent=txt;t.addEventListener('click',fn);row2.appendChild(t);return t}
  addTool('🧹',function(){erasing=true;drawShape=null;bar.querySelectorAll('.cbtn,.tbtn').forEach(x=>x.classList.remove('sel'));this.classList.add('sel')});
  addTool('🗑️',()=>{drawCtx.fillStyle='#fff';drawCtx.fillRect(0,0,cv.width,cv.height)});
  addTool('●',function(){drawSize=drawSize===5?14:5;this.textContent=drawSize===5?'●':'⬤'});
  ['⭕','⬜','🔺','⭐'].forEach((s,i)=>{
    const names=['circle','square','triangle','star'];
    addTool(s,function(){drawShape=names[i];erasing=false;bar.querySelectorAll('.cbtn,.tbtn').forEach(x=>x.classList.remove('sel'));this.classList.add('sel')});
  });
  addTool('📷',()=>{
    cv.toBlob(blob=>{
      if(navigator.share&&navigator.canShare){
        const f=new File([blob],'boyama.png',{type:'image/png'});
        navigator.share({files:[f],title:'Boyama'}).catch(()=>{});
      }else{
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='boyama.png';a.click();URL.revokeObjectURL(a.href);
      }
    },'image/png');
  });
  bar.appendChild(row2);
  function pos(e){const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
  function dn(e){e.preventDefault();if(drawShape){const p=pos(e);stampShape(p.x,p.y);return}drawing=true;const p=pos(e);drawCtx.beginPath();drawCtx.moveTo(p.x,p.y)}
  function mv(e){if(!drawing)return;e.preventDefault();const p=pos(e);drawCtx.lineWidth=erasing?20:drawSize;drawCtx.strokeStyle=erasing?'#fff':drawColor;drawCtx.lineTo(p.x,p.y);drawCtx.stroke();drawCtx.beginPath();drawCtx.moveTo(p.x,p.y)}
  function up(){drawing=false;drawCtx.beginPath()}
  cv.onmousedown=dn;cv.onmousemove=mv;cv.onmouseup=up;cv.onmouseleave=up;
  cv.ontouchstart=dn;cv.ontouchmove=mv;cv.ontouchend=up;cv.ontouchcancel=up;
}
function stampShape(x,y){
  const c=drawCtx,sz=30;c.fillStyle=drawColor;c.strokeStyle=drawColor;c.lineWidth=3;
  if(drawShape==='circle'){c.beginPath();c.arc(x,y,sz,0,Math.PI*2);c.fill()}
  else if(drawShape==='square'){c.fillRect(x-sz,y-sz,sz*2,sz*2)}
  else if(drawShape==='triangle'){c.beginPath();c.moveTo(x,y-sz);c.lineTo(x-sz,y+sz);c.lineTo(x+sz,y+sz);c.closePath();c.fill()}
  else if(drawShape==='star'){c.beginPath();for(let i=0;i<5;i++){const a=Math.PI*2/5*i-Math.PI/2;const b=Math.PI*2/5*i-Math.PI/2+Math.PI/5;c.lineTo(x+Math.cos(a)*sz,y+Math.sin(a)*sz);c.lineTo(x+Math.cos(b)*sz*.45,y+Math.sin(b)*sz*.45)}c.closePath();c.fill()}
}

// ===== 2. HAFIZA (with levels) =====
let memCards,memFlipped=[],memMatched=0,memMoves=0,memLocked=false,memLevel=1,memTotalScore=0;
const memEmojis=['🐱','🐶','🐰','🐟','🐦','🦋','🐢','🦊','🐸','🐙'];
const memLevels=[{pairs:6,rows:3},{pairs:8,rows:4},{pairs:10,rows:5}];
function initHafiza(level){
  if(level===undefined){level=1;memTotalScore=0}
  memLevel=level;memFlipped=[];memMatched=0;memMoves=0;memLocked=false;
  const cfg=memLevels[level-1];const pairCount=cfg.pairs;
  document.getElementById('mem-score').textContent='';
  document.getElementById('mem-info').textContent='Seviye '+level+' - Esleri bul! Hamle: 0';
  const emojis=memEmojis.slice(0,pairCount);
  const pairs=[...emojis,...emojis];sh(pairs);
  const grid=document.getElementById('card-grid');grid.innerHTML='';
  grid.style.gridTemplateColumns='repeat(4,1fr)';
  memCards=pairs.map((emoji,i)=>{
    const card=document.createElement('div');card.className='mcard';card.dataset.idx=i;card.dataset.emoji=emoji;
    card.innerHTML=`<div class="mcard-inner"><div class="mcard-front">❓</div><div class="mcard-back">${emoji}</div></div>`;
    card.addEventListener('click',()=>flipCard(card));grid.appendChild(card);return card;
  });
}
function flipCard(card){
  if(memLocked||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  card.classList.add('flipped');sndPop();memFlipped.push(card);
  if(memFlipped.length===2){memLocked=true;memMoves++;
    document.getElementById('mem-info').textContent='Seviye '+memLevel+' - Esleri bul! Hamle: '+memMoves;
    const[a,b]=memFlipped;
    if(a.dataset.emoji===b.dataset.emoji){a.classList.add('matched');b.classList.add('matched');memMatched+=2;memFlipped=[];memLocked=false;sndOk();
      const totalCards=memLevels[memLevel-1].pairs*2;
      if(memMatched===totalCards){
        const levelScore=Math.max(1,memLevels[memLevel-1].pairs*5-memMoves);
        memTotalScore+=levelScore;
        if(memLevel<3){
          setTimeout(()=>{showFB(true);confetti();
            document.getElementById('mem-info').textContent='Seviye '+memLevel+' Tamam! Skor: '+levelScore;
            setTimeout(()=>initHafiza(memLevel+1),1500);
          },400);
        }else{
          setTimeout(()=>{confetti();saveScore('hafiza',memTotalScore);
            const ov=document.createElement('div');ov.className='lc';ov.innerHTML=`<h2>Tebrikler! 🏆</h2><div class="sb">${memTotalScore} puan</div><p>Tum seviyeleri tamamladin!</p><button id="mem-retry">Tekrar</button><button id="mem-menu">Menu</button>`;
            document.body.appendChild(ov);ov.querySelector('#mem-retry').onclick=()=>{ov.remove();initHafiza()};ov.querySelector('#mem-menu').onclick=()=>{ov.remove();goMenu()};
          },400);
        }
      }
    }else{setTimeout(()=>{a.classList.remove('flipped');b.classList.remove('flipped');memFlipped=[];memLocked=false;sndNo()},700)}
  }
}

// ===== 3. MUZIK (Melodi mode) =====
const notes=[{n:'Do',f:261.6,c:'#e74c3c'},{n:'Re',f:293.7,c:'#e67e22'},{n:'Mi',f:329.6,c:'#f1c40f'},{n:'Fa',f:349.2,c:'#2ecc71'},{n:'Sol',f:392,c:'#3498db'},{n:'La',f:440,c:'#9b59b6'},{n:'Si',f:493.9,c:'#e84393'},{n:'Do2',f:523.3,c:'#d63031'}];
let muzMode='free',melodyLevel=0,melodyIdx=0,melodyLocked=false,melodyScore=0;
const melodies=[
  {name:'Twinkle Twinkle',seq:[0,0,4,4,5,5,4,3,3,2,2,1,1,0]},
  {name:'Kucuk Kurbaga',seq:[0,1,2,0,0,1,2,0,2,3,4,2,3,4]},
  {name:'Mary Had a Lamb',seq:[2,1,0,1,2,2,2,1,1,1,2,4,4]},
  {name:'Ode to Joy',seq:[2,2,3,4,4,3,2,1,0,0,1,2,2,1,1]},
  {name:'Ali Baba Ciftligi',seq:[0,0,0,4,5,5,4,3,3,2,2,1,1,0]}
];
function initMuzik(){
  muzMode='free';melodyLevel=0;melodyScore=0;melodyLocked=false;
  document.getElementById('muzik-score').textContent='';
  document.getElementById('simon-display').textContent='';
  const piano=document.getElementById('piano');piano.innerHTML='';
  notes.forEach((note,i)=>{const k=document.createElement('button');k.className='pkey';k.style.background=note.c;k.dataset.idx=i;k.innerHTML=`<span>${note.n}</span>`;k.addEventListener('pointerdown',(e)=>{e.preventDefault();pressKey(i)});piano.appendChild(k)});
  document.querySelectorAll('#mode-btns button').forEach(b=>{
    b.addEventListener('click',()=>{document.querySelectorAll('#mode-btns button').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');muzMode=b.dataset.mode;document.getElementById('simon-display').textContent='';
      if(muzMode==='melodi'){melodyLevel=0;melodyScore=0;document.getElementById('muzik-score').textContent='Skor: 0';startMelody()}else{document.getElementById('muzik-score').textContent=''}});
  });
}
function pressKey(i){ea();tone(notes[i].f,.35);const keys=document.querySelectorAll('.pkey');keys[i].classList.add('lit');setTimeout(()=>keys[i].classList.remove('lit'),200);
  if(muzMode==='melodi'&&!melodyLocked){
    const mel=melodies[melodyLevel];
    if(i===mel.seq[melodyIdx]){
      melodyIdx++;
      document.getElementById('simon-display').textContent=mel.name+' ('+melodyIdx+'/'+mel.seq.length+')';
      if(melodyIdx===mel.seq.length){
        melodyLocked=true;melodyScore+=mel.seq.length;
        document.getElementById('muzik-score').textContent='Skor: '+melodyScore;
        sndOk();confetti();saveScore('muzik',melodyScore);
        if(melodyLevel<melodies.length-1){
          document.getElementById('simon-display').textContent='Harika! '+mel.name+' tamam! 🎉';
          setTimeout(()=>{melodyLevel++;startMelody()},1500);
        }else{
          document.getElementById('simon-display').textContent='Tum melodileri bitirdin! 🏆 Skor: '+melodyScore;
        }
      }
    }else{
      sndNo();showFB(false);
      document.getElementById('simon-display').textContent='Yanlis! Tekrar dinle...';
      melodyLocked=true;setTimeout(()=>playMelody(),800);
    }
  }
}
function startMelody(){
  const mel=melodies[melodyLevel];melodyIdx=0;melodyLocked=true;
  document.getElementById('simon-display').textContent='Seviye '+(melodyLevel+1)+': '+mel.name+'\nDinle...';
  setTimeout(()=>playMelody(),600);
}
function playMelody(){
  melodyLocked=true;const mel=melodies[melodyLevel];let i=0;
  const iv=setInterval(()=>{
    if(i>=mel.seq.length){clearInterval(iv);melodyLocked=false;melodyIdx=0;
      document.getElementById('simon-display').textContent=mel.name+' - Senin siran! (0/'+mel.seq.length+')';return}
    const idx=mel.seq[i];tone(notes[idx].f,.3);
    const keys=document.querySelectorAll('.pkey');keys[idx].classList.add('lit');setTimeout(()=>keys[idx].classList.remove('lit'),300);i++;
  },450);
}

// ===== 4. MARIO (simplified, no pits, no death from enemies) =====
let runCanvas,runCtx,runAF,runAlive,runScore3,mario,marioCoins,marioEnemies,marioPlatforms,runFrame,cameraX,marioKeys;
const MARIO_G=0.5,MARIO_JUMP=-10,MARIO_SPD=3;
const heroImg=new Image();heroImg.src='hero.png';let heroLoaded=false;heroImg.onload=()=>{heroLoaded=true};
function initRunner(){
  runCanvas=document.getElementById('run-canvas');runCanvas.width=Math.min(runCanvas.parentElement.clientWidth,500);runCanvas.height=280;runCtx=runCanvas.getContext('2d');
  mario={x:60,y:0,vy:0,vx:0,onGround:true,facing:1,flash:0};marioCoins=[];marioEnemies=[];marioPlatforms=[];runScore3=0;runFrame=0;cameraX=0;runAlive=true;marioKeys={left:false,right:false};
  document.getElementById('runner-score').textContent='Skor: 0';document.getElementById('run-info').textContent='';
  // Continuous ground - no pits!
  const GY=230;
  for(let i=0;i<50;i++){marioPlatforms.push({x:i*100,y:GY,w:100,h:50,type:'ground'})}
  for(let i=3;i<50;i++){if(Math.random()>.6)marioPlatforms.push({x:i*100+R(0,40),y:GY-R(60,120),w:R(60,100),h:16,type:'brick'})}
  for(let i=2;i<50;i++){if(Math.random()>.4){const py=marioPlatforms.find(p=>p.x>=i*100-50&&p.x<=i*100+50);const cy=py?(py.y-40):(GY-30);marioCoins.push({x:i*100+R(10,80),y:cy-R(10,30),collected:false})}}
  for(let i=4;i<50;i++){if(Math.random()>.65)marioEnemies.push({x:i*100+R(20,70),y:GY-20,alive:true,dir:-1,startX:i*100+20})}
  mario.y=GY-30;
  const lb=document.getElementById('mario-left'),rb=document.getElementById('mario-right'),jb=document.getElementById('mario-jump-btn');
  function hold(btn,key){btn.ontouchstart=btn.onmousedown=function(e){e.preventDefault();marioKeys[key]=true};btn.ontouchend=btn.onmouseup=btn.ontouchcancel=function(e){e.preventDefault();marioKeys[key]=false}}
  hold(lb,'left');hold(rb,'right');
  jb.ontouchstart=jb.onmousedown=function(e){e.preventDefault();ea();if(mario.onGround){mario.vy=MARIO_JUMP;mario.onGround=false;tone(500,.08)}};
  document.onkeydown=function(e){if(curGame!=='runner')return;if(e.key==='ArrowLeft')marioKeys.left=true;if(e.key==='ArrowRight')marioKeys.right=true;if((e.key==='ArrowUp'||e.key===' ')&&mario.onGround){mario.vy=MARIO_JUMP;mario.onGround=false;tone(500,.08)}};
  document.onkeyup=function(e){if(e.key==='ArrowLeft')marioKeys.left=false;if(e.key==='ArrowRight')marioKeys.right=false};
  if(runAF)clearInterval(runAF);runAF=setInterval(marioLoop,16);
}
function stopRunner(){if(runAF){clearInterval(runAF);runAF=null}}
function marioLoop(){if(curGame!=='runner')return;const c=runCtx,W=runCanvas.width,H=runCanvas.height;runFrame++;
  if(marioKeys.left){mario.vx=-MARIO_SPD;mario.facing=-1}else if(marioKeys.right){mario.vx=MARIO_SPD;mario.facing=1}else mario.vx=0;mario.x+=mario.vx;if(mario.x<10)mario.x=10;
  mario.vy+=MARIO_G;mario.y+=mario.vy;mario.onGround=false;
  for(const p of marioPlatforms){if(mario.x+14>p.x&&mario.x-14<p.x+p.w&&mario.y+24>p.y&&mario.y+24<p.y+p.h+8&&mario.vy>=0){mario.y=p.y-24;mario.vy=0;mario.onGround=true;break}}
  // Safety: if somehow falls, respawn on ground
  if(mario.y>H+50){mario.y=180;mario.vy=0}
  if(mario.flash>0)mario.flash--;
  marioCoins.forEach(coin=>{if(!coin.collected&&Math.abs(mario.x-coin.x)<20&&Math.abs(mario.y-coin.y)<24){coin.collected=true;runScore3++;document.getElementById('runner-score').textContent='Skor: '+runScore3;sndOk();tone(800,.08);setTimeout(()=>tone(1000,.08),60)}});
  marioEnemies.forEach(en=>{if(!en.alive)return;en.x+=en.dir*0.8;if(en.x<en.startX-40||en.x>en.startX+40)en.dir*=-1;
    if(Math.abs(mario.x-en.x)<18&&Math.abs(mario.y-en.y)<20){
      if(mario.vy>0&&mario.y<en.y){en.alive=false;mario.vy=MARIO_JUMP*.6;runScore3+=2;document.getElementById('runner-score').textContent='Skor: '+runScore3;sndOk()}
      else if(mario.flash<=0){
        // Enemy hit: lose 1 point, bounce back, flash
        if(runScore3>0)runScore3--;
        document.getElementById('runner-score').textContent='Skor: '+runScore3;
        mario.vy=MARIO_JUMP*.5;mario.x+=mario.facing*-30;mario.flash=40;sndNo();
      }
    }
  });
  cameraX=mario.x-W*0.3;if(cameraX<0)cameraX=0;
  // Draw
  c.save();const skyG=c.createLinearGradient(0,0,0,H);skyG.addColorStop(0,'#74b9ff');skyG.addColorStop(1,'#a29bfe');c.fillStyle=skyG;c.fillRect(0,0,W,H);
  c.fillStyle='rgba(255,255,255,.6)';for(let i=0;i<8;i++){const cx=(i*200-cameraX*.2+1000)%1600-200;c.beginPath();c.arc(cx,30+i*8%40,18,0,Math.PI*2);c.arc(cx+20,25+i*8%40,24,0,Math.PI*2);c.fill()}
  c.fillStyle='#55efc4';for(let i=0;i<10;i++){const hx=i*250-cameraX*.3;c.beginPath();c.arc(hx,H,80,Math.PI,0);c.fill()}
  c.translate(-cameraX,0);
  marioPlatforms.forEach(p=>{if(p.x+p.w<cameraX-50||p.x>cameraX+W+50)return;if(p.type==='ground'){c.fillStyle='#b07940';c.fillRect(p.x,p.y,p.w,p.h);c.fillStyle='#2ecc71';c.fillRect(p.x,p.y,p.w,8)}else{c.fillStyle='#c0392b';c.fillRect(p.x,p.y,p.w,p.h);c.strokeStyle='#e74c3c';c.lineWidth=2;for(let bx=p.x;bx<p.x+p.w;bx+=20){c.strokeRect(bx,p.y,20,p.h)}}});
  c.font='20px serif';c.textAlign='center';c.textBaseline='middle';
  marioCoins.forEach(coin=>{if(!coin.collected){const bounce=Math.sin(runFrame*.08+coin.x)*3;c.fillText('🪙',coin.x,coin.y+bounce)}});
  marioEnemies.forEach(en=>{if(en.alive)c.fillText('🍄',en.x,en.y)});
  // Hero with flash effect
  const HW=52,HH=62;
  if(mario.flash>0&&mario.flash%6<3){/* skip draw for flash */}
  else if(heroLoaded){c.save();if(mario.facing<0){c.translate(mario.x,mario.y+24-HH);c.scale(-1,1);c.drawImage(heroImg,-HW/2,0,HW,HH)}else{c.drawImage(heroImg,mario.x-HW/2,mario.y+24-HH,HW,HH)}c.restore()}
  else{c.font='26px serif';c.textAlign='center';c.textBaseline='bottom';c.fillText('🏃',mario.x,mario.y+24)}
  c.restore();
  // Check if all coins collected
  if(marioCoins.length>0&&marioCoins.every(c=>c.collected)){
    saveScore('runner',runScore3);
    c.fillStyle='rgba(0,0,0,.4)';c.fillRect(0,0,W,H);c.fillStyle='#fff';c.font='bold 18px Nunito,sans-serif';c.textAlign='center';c.textBaseline='middle';
    c.fillText('Tebrikler! Tum coinler toplandi!',W/2,H/2-15);c.font='14px Nunito,sans-serif';c.fillText('Skor: '+runScore3,W/2,H/2+15);
    return; // stop loop
  }
  // loop continues via setInterval
}

// ===== 5. BALON MATEMATIK =====
let balonLevel=1,balonQ=0,balonCorrect=0,balonAnswer=0,balonA=0,balonB=0,balonAnim=null,balonBalloons=[];
function initBalon(level){
  if(level===undefined){level=1;balonCorrect=0}
  balonLevel=level;balonQ=0;
  document.getElementById('balon-score').textContent='Seviye '+level;
  newBalonQuestion();
}
function stopBalon(){if(balonAnim){clearInterval(balonAnim);balonAnim=null}}
function newBalonQuestion(){
  balonQ++;
  if(balonQ>10){
    // Level complete
    stopBalon();
    if(balonCorrect>=7&&balonLevel<3){
      const ov=document.createElement('div');ov.className='lc';ov.innerHTML=`<h2>Seviye ${balonLevel} Tamam! 🎉</h2><div class="sb">${balonCorrect}/10</div><button id="bal-next">Sonraki Seviye</button>`;
      document.body.appendChild(ov);confetti();ov.querySelector('#bal-next').onclick=()=>{ov.remove();initBalon(balonLevel+1)};
    }else if(balonCorrect>=7&&balonLevel===3){
      saveScore('balon',balonLevel*10+balonCorrect);
      const ov=document.createElement('div');ov.className='lc';ov.innerHTML=`<h2>Tebrikler! 🏆</h2><div class="sb">${balonCorrect}/10</div><p>Tum seviyeleri tamamladin!</p><button id="bal-retry">Tekrar</button><button id="bal-menu">Menu</button>`;
      document.body.appendChild(ov);confetti();ov.querySelector('#bal-retry').onclick=()=>{ov.remove();initBalon()};ov.querySelector('#bal-menu').onclick=()=>{ov.remove();goMenu()};
    }else{
      saveScore('balon',Math.max(1,(balonLevel-1)*10+balonCorrect));
      const ov=document.createElement('div');ov.className='lc';ov.innerHTML=`<h2>Seviye ${balonLevel}</h2><div class="sb">${balonCorrect}/10</div><p>7 dogru gerekli. Tekrar dene!</p><button id="bal-retry">Tekrar</button><button id="bal-menu">Menu</button>`;
      document.body.appendChild(ov);ov.querySelector('#bal-retry').onclick=()=>{ov.remove();initBalon(balonLevel)};ov.querySelector('#bal-menu').onclick=()=>{ov.remove();goMenu()};
    }
    return;
  }
  // Generate question based on level
  if(balonLevel===1){balonA=R(1,5);balonB=R(1,5)}
  else if(balonLevel===2){balonA=R(1,9);balonB=R(1,5)}
  else{balonA=R(1,9);balonB=R(1,9)}
  balonAnswer=balonA+balonB;
  document.getElementById('balon-question').textContent=balonA+' + '+balonB+' = ?';
  document.getElementById('balon-progress').textContent='Soru '+balonQ+'/10  Dogru: '+balonCorrect;
  spawnBalonSet();
}
function spawnBalonSet(){
  const area=document.getElementById('balon-area');area.innerHTML='';
  stopBalon();
  const answers=[balonAnswer];
  while(answers.length<4){const w=balonAnswer+R(-3,3);if(w>0&&w!==balonAnswer&&!answers.includes(w))answers.push(w)}
  while(answers.length<4)answers.push(balonAnswer+answers.length);
  sh(answers);
  const positions=[10,30,50,70];sh(positions);
  balonBalloons=[];
  answers.forEach((num,i)=>{
    const b=document.createElement('div');b.className='balon';b.style.left=positions[i]+'%';b.style.bottom='-100px';
    b.style.width='70px';
    const col=['#e74c3c','#3498db','#2ecc71','#f1c40f'][i];
    b.innerHTML=`<svg viewBox="0 0 70 90"><ellipse cx="35" cy="32" rx="30" ry="32" fill="${col}"/><polygon points="35,64 28,76 42,76" fill="${col}"/><line x1="35" y1="76" x2="35" y2="90" stroke="#aaa" stroke-width="2"/><ellipse cx="24" cy="20" rx="7" ry="9" fill="rgba(255,255,255,.25)" transform="rotate(-15 24 20)"/><text x="35" y="38" text-anchor="middle" font-size="24" font-weight="bold" font-family="Nunito,sans-serif" fill="#fff">${num}</text></svg>`;
    b.addEventListener('click',()=>{
      if(b.classList.contains('pop'))return;
      if(num===balonAnswer){
        b.classList.add('pop');sndOk();showFB(true);balonCorrect++;
        document.getElementById('balon-progress').textContent='Soru '+balonQ+'/10  Dogru: '+balonCorrect;
        stopBalon();setTimeout(newBalonQuestion,800);
      }else{
        sndNo();b.style.animation='shake .4s';setTimeout(()=>b.style.animation='',400);
      }
    });
    area.appendChild(b);balonBalloons.push({el:b,posY:-100});
  });
  balonAnim=setInterval(()=>{
    let allGone=true;
    balonBalloons.forEach(bl=>{
      if(!bl.el.parentElement||bl.el.classList.contains('pop'))return;
      bl.posY+=1.2;bl.el.style.bottom=bl.posY+'px';
      if(bl.posY>area.clientHeight+100){bl.el.remove()}
      else allGone=false;
    });
    if(allGone){stopBalon();setTimeout(()=>spawnBalonSet(),500)}
  },25);
}

// ===== 6. ARABA YARISI =====
let arabaCanvas,arabaCtx,arabaAF,arabaScore=0,arabaLane=1,arabaFrame=0,arabaSpeed=2,arabaObjs=[];
function initAraba(){
  arabaCanvas=document.getElementById('araba-canvas');
  const w=Math.min(arabaCanvas.parentElement.clientWidth,400);
  arabaCanvas.width=w;arabaCanvas.height=Math.min(window.innerHeight-100,600);
  arabaCtx=arabaCanvas.getContext('2d');
  arabaScore=0;arabaLane=1;arabaFrame=0;arabaSpeed=2;arabaObjs=[];
  document.getElementById('araba-score').textContent='0';
  // Touch controls
  let touchX=null;
  arabaCanvas.ontouchstart=function(e){e.preventDefault();touchX=e.touches[0].clientX};
  arabaCanvas.ontouchmove=function(e){e.preventDefault();
    if(touchX!==null){const dx=e.touches[0].clientX-touchX;if(dx>25){arabaLane=Math.min(2,arabaLane+1);touchX=e.touches[0].clientX}else if(dx<-25){arabaLane=Math.max(0,arabaLane-1);touchX=e.touches[0].clientX}}};
  arabaCanvas.ontouchend=function(){touchX=null};
  arabaCanvas.onclick=function(e){const r=arabaCanvas.getBoundingClientRect();const x=e.clientX-r.left;const lw=arabaCanvas.width/3;if(x<lw)arabaLane=0;else if(x<lw*2)arabaLane=1;else arabaLane=2};
  document.onkeydown=function(e){if(curGame!=='araba')return;if(e.key==='ArrowLeft')arabaLane=Math.max(0,arabaLane-1);if(e.key==='ArrowRight')arabaLane=Math.min(2,arabaLane+1)};
  if(arabaAF)clearInterval(arabaAF);arabaAF=setInterval(arabaLoop,16);
}
function stopAraba(){if(arabaAF){clearInterval(arabaAF);arabaAF=null}}
function arabaLoop(){
  if(curGame!=='araba')return;
  const c=arabaCtx,W=arabaCanvas.width,H=arabaCanvas.height;arabaFrame++;
  const lw=W/3;
  // Spawn objects
  if(arabaFrame%Math.max(15,35-arabaScore)===0){
    const lane=R(0,2);
    if(Math.random()>.35){arabaObjs.push({type:'star',lane:lane,y:-30})}
    else{arabaObjs.push({type:'rock',lane:lane,y:-30})}
  }
  // Move & check
  arabaObjs.forEach(o=>{o.y+=arabaSpeed});
  const carY=H-80;
  arabaObjs=arabaObjs.filter(o=>{
    if(o.y>H+40)return false;
    if(o.y+20>carY-15&&o.y-20<carY+30&&o.lane===arabaLane){
      if(o.type==='star'){arabaScore++;sndOk();document.getElementById('araba-score').textContent=arabaScore;return false}
      else{if(arabaScore>0)arabaScore--;sndNo();document.getElementById('araba-score').textContent=arabaScore;return false}
    }
    return true;
  });
  // Speed up
  if(arabaFrame%200===0&&arabaSpeed<5)arabaSpeed+=0.3;
  // Draw road
  c.fillStyle='#555';c.fillRect(0,0,W,H);
  // Lane lines (dashed)
  c.strokeStyle='#fff';c.lineWidth=2;c.setLineDash([20,15]);
  const dashOffset=-(arabaFrame*arabaSpeed*2)%35;
  c.lineDashOffset=dashOffset;
  for(let i=1;i<3;i++){c.beginPath();c.moveTo(i*lw,0);c.lineTo(i*lw,H);c.stroke()}
  c.setLineDash([]);
  // Road edges
  c.fillStyle='#e74c3c';c.fillRect(0,0,4,H);c.fillRect(W-4,0,4,H);
  // Objects
  c.font='28px serif';c.textAlign='center';c.textBaseline='middle';
  arabaObjs.forEach(o=>{
    const x=o.lane*lw+lw/2;
    if(o.type==='star')c.fillText('⭐',x,o.y);
    else c.fillText('🪨',x,o.y);
  });
  // Car
  const carX=arabaLane*lw+lw/2;
  c.font='38px serif';c.fillText('🏎️',carX,carY);
  // Score display
  saveScore('araba',arabaScore);
  // loop continues via setInterval
}

let gokLevel=0,gokSelected=null,gokDone=0;
const gokTemplates=[
  {name:'Gokkusagi',cells:[
    {label:'',color:'#e74c3c'},{label:'',color:'#e67e22'},{label:'',color:'#f1c40f'},
    {label:'',color:'#2ecc71'},{label:'',color:'#3498db'},{label:'',color:'#0984e3'},
    {label:'',color:'#6c5ce7'}
  ],layout:'rows'},
  {name:'Cicek',cells:[
    {label:'🌸',color:'#fd79a8'},{label:'🌸',color:'#fd79a8'},{label:'🌸',color:'#fd79a8'},
    {label:'🌸',color:'#fd79a8'},{label:'🌸',color:'#fd79a8'},
    {label:'🌿',color:'#00b894'},{label:'🌿',color:'#00b894'}
  ],layout:'flower'},
  {name:'Kelebek',cells:[
    {label:'',color:'#e84393'},{label:'',color:'#6c5ce7'},
    {label:'',color:'#e84393'},{label:'',color:'#6c5ce7'},
    {label:'',color:'#fdcb6e'},{label:'',color:'#fdcb6e'}
  ],layout:'butterfly'},
  {name:'Balik',cells:[
    {label:'',color:'#0984e3'},{label:'',color:'#74b9ff'},{label:'',color:'#0984e3'},
    {label:'',color:'#74b9ff'},{label:'',color:'#f1c40f'}
  ],layout:'fish'}
];
const gokAllColors=['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#0984e3','#6c5ce7','#fd79a8','#00b894','#fdcb6e','#74b9ff'];
function initGok(level){
  if(level===undefined)level=0;
  gokLevel=level;gokSelected=null;gokDone=0;
  if(level>=gokTemplates.length){
    saveScore('gok',gokTemplates.length*10);
    const ov=document.createElement('div');ov.className='lc';ov.innerHTML='<h2>Tebrikler! 🏆</h2><div class="sb">Tum sablonlar bitti!</div><button id="gok-retry">Tekrar</button><button id="gok-menu">Menu</button>';
    document.body.appendChild(ov);confetti();ov.querySelector('#gok-retry').onclick=()=>{ov.remove();initGok()};ov.querySelector('#gok-menu').onclick=()=>{ov.remove();goMenu()};
    return;
  }
  const tmpl=gokTemplates[level];
  document.getElementById('gok-score').textContent='Seviye '+(level+1);
  document.getElementById('gok-info').textContent=tmpl.name+' - Dogru rengi sec ve bolgeye dokun!';
  const container=document.getElementById('gok-template');container.innerHTML='';
  // Create cells
  tmpl.cells.forEach((cell,i)=>{
    const el=document.createElement('div');
    el.className='gok-cell';
    el.style.background='#ddd';
    el.style.borderRadius='10px';el.style.margin='3px';
    el.style.minHeight='48px';el.style.minWidth='48px';
    el.textContent=cell.label||'?';
    el.style.color='#999';el.style.fontSize='1.5em';el.style.fontWeight='900';
    el.dataset.idx=i;
    el.addEventListener('click',()=>{
      if(el.classList.contains('done')||!gokSelected)return;
      if(gokSelected===cell.color){
        el.style.background=cell.color;el.classList.add('done');el.textContent=cell.label||'';el.style.color=cell.color;
        sndOk();gokDone++;
        if(gokDone===tmpl.cells.length){
          confetti();showFB(true);saveScore('gok',(level+1)*10);
          setTimeout(()=>initGok(level+1),1200);
        }
      }else{
        el.classList.add('wrong');sndNo();setTimeout(()=>el.classList.remove('wrong'),400);
      }
    });
    container.appendChild(el);
  });
  container.style.display='flex';container.style.flexWrap='wrap';container.style.justifyContent='center';
  // Color palette
  const colDiv=document.getElementById('gok-colors');colDiv.innerHTML='';
  // Get unique colors from this template
  const needed=[...new Set(tmpl.cells.map(c=>c.color))];
  // Add some distractors
  const palette=[...needed];
  const extras=gokAllColors.filter(c=>!needed.includes(c));
  sh(extras);
  while(palette.length<Math.min(8,needed.length+3)&&extras.length>0)palette.push(extras.pop());
  sh(palette);
  palette.forEach(color=>{
    const btn=document.createElement('div');btn.className='gok-cbtn';btn.style.background=color;
    btn.addEventListener('click',()=>{
      colDiv.querySelectorAll('.gok-cbtn').forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');gokSelected=color;
    });
    colDiv.appendChild(btn);
  });
}

  uzayCanvas.ontouchend=function(){touchX=null};
  uzayCanvas.onclick=function(e){const r=uzayCanvas.getBoundingClientRect();const x=e.clientX-r.left;const lw=uzayCanvas.width/3;if(x<lw)uzayLane=0;else if(x<lw*2)uzayLane=1;else uzayLane=2};
  document.onkeydown=function(e){if(curGame!=='uzay')return;if(e.key==='ArrowLeft')uzayLane=Math.max(0,uzayLane-1);if(e.key==='ArrowRight')uzayLane=Math.min(2,uzayLane+1)};
  if(uzayAF)clearInterval(uzayAF);uzayAF=setInterval(uzayLoop,16);
}
function stopUzay(){if(uzayAF){clearInterval(uzayAF);uzayAF=null}}
function uzayLoop(){
  if(curGame!=='uzay')return;
  const c=uzayCtx,W=uzayCanvas.width,H=uzayCanvas.height;uzayFrame++;
  const lw=W/3;
  // Spawn
  if(uzayFrame%Math.max(15,35-uzayScore)===0){
    const lane=R(0,2);
    if(Math.random()>.4)uzayObjs.push({type:'star',lane:lane,y:-30});
    else uzayObjs.push({type:'meteor',lane:lane,y:-30});
  }
  // Move
  uzayObjs.forEach(o=>{o.y+=uzaySpeed});
  const rocketY=H-70;
  uzayObjs=uzayObjs.filter(o=>{
    if(o.y>H+40)return false;
    if(o.y+20>rocketY-15&&o.y-20<rocketY+25&&o.lane===uzayLane){
      if(o.type==='star'){uzayScore++;sndOk();document.getElementById('uzay-score').textContent=uzayScore;return false}
      else{if(uzayScore>0)uzayScore--;sndNo();document.getElementById('uzay-score').textContent=uzayScore;return false}
    }
    return true;
  });
  if(uzayFrame%200===0&&uzaySpeed<5)uzaySpeed+=0.3;
  // Draw space background
  c.fillStyle='#0a0a2e';c.fillRect(0,0,W,H);

  uzayStars.forEach(s=>{
    s.y+=s.s*0.5;if(s.y>H){s.y=0;s.x=R(0,W)}
    s.b+=0.02;const alpha=0.3+Math.abs(Math.sin(s.b))*0.7;
    c.fillStyle=`rgba(255,255,255,${alpha})`;c.beginPath();c.arc(s.x,s.y,s.s,0,Math.PI*2);c.fill();
  });
  // Objects
  c.font='28px serif';c.textAlign='center';c.textBaseline='middle';
  uzayObjs.forEach(o=>{

    else c.fillText('☄️',x,o.y);
  });

  const rocketX=uzayLane*lw+lw/2;

}
